<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>XAUUSD裁量トレード練習＆検証</title>
<style>
:root{
--bg:#0e1320;
--panel:#141b2d;
--panel2:#1b2439;
--panel3:#202a43;
--text:#eef3ff;
--muted:#9eacc9;
--line:#2b3550;
--grid:#23304a;
--border:#27324c;
--accent:#4f95ff;
--accent2:#8db7ff;
--buy:#1fb86a;
--sell:#d94b57;
--warn:#d7a72b;
--shadow:none;
--priceAxisW:58px;
--headerRowH:42px;
--infoH:38px;
--tradeH:56px;
--replayH:52px;
--radius:10px;
--safeTop:env(safe-area-inset-top);
--safeBottom:env(safe-area-inset-bottom);
}
body.light{
--bg:#f3f5fa;
--panel:#ffffff;
--panel2:#eef2fb;
--panel3:#e6edf9;
--text:#162033;
--muted:#66738e;
--line:#c7d1e4;
--grid:#d8dfec;
--border:#d5dde9;
--accent:#2d6dff;
--accent2:#7ca7ff;
--buy:#149955;
--sell:#c93d4b;
--warn:#b07f00;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif}
body{overflow:hidden;touch-action:manipulation}
button,input,select,textarea{font:inherit;color:inherit}
button{border:none;background:none}
input,select,textarea{outline:none}
.app{
height:100dvh;
display:flex;
flex-direction:column;
background:var(--bg);
}
.screen{display:none;height:100%;width:100%}
.screen.active{display:flex;flex-direction:column}
.topbar{
padding-top:var(--safeTop);
background:var(--panel);
border-bottom:1px solid var(--border);
}
.toprow{
min-height:var(--headerRowH);
display:grid;
align-items:center;
gap:4px;
padding:4px 6px;
}
.toprow.row1{grid-template-columns:auto 1fr auto auto}
.toprow.row2{grid-template-columns:auto 1fr auto}
.seg,.segCompact{
display:flex;
gap:2px;
padding:2px;
background:var(--panel2);
border:1px solid var(--border);
border-radius:10px;
min-height:34px;
}
.seg button,.segCompact button{
min-width:38px;
min-height:28px;
padding:0 8px;
border-radius:8px;
color:var(--text);
font-size:12px;
font-weight:700;
}
.seg button.active,.segCompact button.active{
background:var(--accent);
color:#fff;
}
.centerPack{
min-width:0;
display:grid;
grid-template-columns:1fr 74px;
gap:4px;
align-items:center;
}
.speedBox,.smallBox,.tinyBtn,.menuBtn,.backBtn,.tabBtn,.settingBtn,.actionBtn{
background:var(--panel2);
border:1px solid var(--border);
border-radius:10px;
}
.speedBox{
min-width:0;
min-height:34px;
padding:2px 6px;
display:flex;
align-items:center;
gap:6px;
}
.speedBox label{
font-size:10px;
color:var(--muted);
white-space:nowrap;
}
.speedBox strong{
font-size:10px;
color:var(--text);
white-space:nowrap;
}
.speedBox input[type=range]{
flex:1;
min-width:52px;
}
.smallBox{
min-height:34px;
display:flex;
align-items:center;
justify-content:center;
gap:4px;
padding:0 6px;
}
.smallBox span{
font-size:10px;
color:var(--muted);
white-space:nowrap;
}
.smallBox input{
width:34px;
height:26px;
border:1px solid var(--border);
border-radius:8px;
background:var(--panel3);
text-align:center;
font-size:12px;
}
.menuBtn,.backBtn{
width:34px;height:34px;
display:flex;align-items:center;justify-content:center;
font-size:18px;font-weight:700;
}
.actionRight{
display:flex;
gap:4px;
justify-content:flex-end;
}
.tinyBtn{
min-height:34px;
padding:0 9px;
font-size:11px;
font-weight:700;
}
.tinyBtn.active{
background:var(--accent);
color:#fff;
}
.chartWrap{
flex:1;
min-height:0;
display:flex;
flex-direction:column;
background:var(--bg);
}
.chartPane{
position:relative;
flex:1;
min-height:0;
border-bottom:1px solid var(--border);
background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.02));
}
.chartPane:last-child{border-bottom:none}
.chartPane.split{height:50%}
.chartCanvas{
width:100%;
height:100%;
display:block;
touch-action:none;
}
.paneBadge,.modeBadge{
position:absolute;
top:6px;
font-size:10px;
line-height:1;
padding:4px 6px;
border-radius:999px;
color:#fff;
pointer-events:none;
}
.paneBadge{left:6px;background:rgba(0,0,0,.35)}
.modeBadge{right:6px;background:rgba(0,0,0,.25)}
body.light .paneBadge,body.light .modeBadge{background:rgba(16,25,40,.68)}
.infoBar{
min-height:var(--infoH);
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr auto;
gap:4px;
padding:4px 6px;
background:var(--panel);
border-top:1px solid var(--border);
overflow:auto hidden;
}
.infoItem{
min-width:0;
padding:3px 6px;
border:1px solid var(--border);
border-radius:10px;
background:var(--panel2);
}
.infoItem .k{
font-size:9px;
color:var(--muted);
line-height:1.1;
}
.infoItem .v{
margin-top:2px;
font-size:11px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.replayBar{
min-height:var(--replayH);
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:4px;
padding:4px 6px;
background:var(--panel);
border-top:1px solid var(--border);
}
.replayBtn{
min-height:44px;
border:1px solid var(--border);
border-radius:12px;
background:var(--panel2);
color:var(--text);
font-size:18px;
font-weight:800;
}
.replayBtn.active{background:var(--accent);color:#fff}
.tradeBar{
min-height:calc(var(--tradeH) + var(--safeBottom));
padding:4px 6px calc(4px + var(--safeBottom));
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:4px;
background:var(--panel);
border-top:1px solid var(--border);
}
.tradeBtn{
min-height:48px;
border-radius:12px;
font-size:16px;
font-weight:800;
color:#fff;
}
.sellBtn{background:var(--sell)}
.buyBtn{background:var(--buy)}
.closeBtn{background:#75819a}
.tradeBtn:disabled,.replayBtn:disabled,.tinyBtn:disabled,.actionBtn:disabled{opacity:.45}
.overlay,.sheet,.modal,.contextMenu{
position:fixed;
inset:0;
display:none;
z-index:80;
}
.overlay.active,.sheet.active,.modal.active,.contextMenu.active{display:block}
.backdrop{
position:absolute;
inset:0;
background:rgba(0,0,0,.42);
}
.menuPanel,.sheetPanel,.modalPanel,.ctxPanel{
position:absolute;
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
}
.menuPanel{
top:calc(var(--safeTop) + 48px);
right:8px;
width:188px;
padding:6px;
display:grid;
gap:4px;
}
.settingBtn,.menuItem,.ctxBtn,.sheetBtn{
min-height:38px;
padding:0 10px;
text-align:left;
border:1px solid var(--border);
border-radius:10px;
background:var(--panel2);
font-size:12px;
font-weight:700;
}
.modalPanel{
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:min(92vw,360px);
padding:12px;
}
.modalTitle{font-size:15px;font-weight:800;margin-bottom:8px}
.modalMsg{font-size:12px;color:var(--muted);line-height:1.5}
.modalBtns{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}
.actionBtn{
min-height:38px;
font-size:12px;
font-weight:800;
}
.actionBtn.primary{background:var(--accent);color:#fff}
.sheetPanel{
left:0;right:0;bottom:0;
border-bottom-left-radius:0;
border-bottom-right-radius:0;
padding:10px;
max-height:82dvh;
overflow:auto;
}
.sheetTitle{
font-size:14px;
font-weight:800;
margin-bottom:8px;
}
.sheetGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}
.field{
display:flex;
flex-direction:column;
gap:4px;
margin-bottom:8px;
}
.field label{
font-size:10px;
color:var(--muted);
}
.field input,.field select{
min-height:36px;
border:1px solid var(--border);
border-radius:10px;
background:var(--panel2);
padding:0 10px;
}
.sheetActions{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}
.ctxPanel{
min-width:156px;
padding:6px;
display:grid;
gap:4px;
}
.statsHeader{
padding-top:var(--safeTop);
min-height:46px;
display:grid;
grid-template-columns:auto 1fr;
gap:6px;
align-items:center;
padding-left:6px;
padding-right:6px;
padding-bottom:4px;
background:var(--panel);
border-bottom:1px solid var(--border);
}
.statsTabs{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:4px;
}
.statsMain{
flex:1;
min-height:0;
overflow:auto;
padding:6px;
background:var(--bg);
}
.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:8px;
margin-bottom:8px;
}
.card h3{
margin:0 0 8px;
font-size:13px;
}
.metricGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}
.metric{
border:1px solid var(--border);
border-radius:10px;
background:var(--panel2);
padding:8px;
}
.metric .mk{font-size:10px;color:var(--muted)}
.metric .mv{font-size:16px;font-weight:800;margin-top:4px}
.graphBox{
border:1px solid var(--border);
border-radius:10px;
background:var(--panel2);
padding:4px;
margin-bottom:6px;
}
.graphCanvas{
width:100%;
height:196px;
display:block;
}
.switchRow{
min-height:38px;
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:6px 0;
}
.switchText{font-size:12px}
.switchSub{font-size:10px;color:var(--muted)}
.switch{
position:relative;
width:48px;height:28px;
border:1px solid var(--border);
border-radius:999px;
background:var(--line);
}
.switch::after{
content:"";
position:absolute;
top:2px;left:2px;
width:22px;height:22px;
border-radius:50%;
background:#fff;
transition:.18s;
}
.switch.on{background:var(--accent)}
.switch.on::after{left:22px}
.tableWrap{
overflow:auto;
border:1px solid var(--border);
border-radius:10px;
}
table{
width:100%;
border-collapse:collapse;
font-size:11px;
}
th,td{
padding:7px 6px;
border-bottom:1px solid var(--border);
text-align:right;
white-space:nowrap;
}
th:first-child,td:first-child{text-align:left}
thead th{
position:sticky;
top:0;
background:var(--panel2);
z-index:1;
}
.badge{
display:inline-flex;
align-items:center;
min-height:22px;
padding:0 8px;
border-radius:999px;
background:var(--panel2);
border:1px solid var(--border);
font-size:10px;
color:var(--muted);
}
.rowBtns{
display:flex;
gap:6px;
flex-wrap:wrap;
}
.hidden{display:none!important}
.note{
font-size:11px;
color:var(--muted);
line-height:1.5;
}
@media (min-width:768px){
.app{max-width:540px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}
}
</style>
</head>
<body>
<div class="app">
<section id="chartScreen" class="screen active">
<div class="topbar">
<div class="toprow row1">
<div class="seg" id="modeSeg">
<button data-mode="practice" class="active">練習</button>
<button data-mode="review">検証</button>
</div>
<div class="centerPack">
<div class="speedBox">
<label>通常</label>
<input id="speedRange" type="range" min="2" max="60" step="1" value="18">
<strong id="speedLabel">18本/分</strong>
</div>
<div class="smallBox">
<span>x</span>
<input id="fastInput" type="number" min="1" max="50" step="1" value="10">
</div>
</div>
<div class="segCompact" id="viewSeg">
<button data-view="single" class="active">1</button>
<button data-view="split">2</button>
</div>
<button id="menuBtn" class="menuBtn">☰</button>
</div>
<div class="toprow row2">
<div class="seg" id="sessionSeg">
<button data-session="asia">アジア</button>
<button data-session="london">ロンドン</button>
<button data-session="ny">NY</button>
</div>
<div class="seg" id="tfSeg" style="justify-self:center">
<button data-tf="M1" class="active">M1</button>
<button data-tf="M15">M15</button>
<button data-tf="H1">H1</button>
</div>
<div class="actionRight">
<button id="slModeBtn" class="tinyBtn">SL</button>
<button id="tpModeBtn" class="tinyBtn">TP</button>
</div>
</div>
</div>

<div class="chartWrap">
<div class="chartPane" id="paneTop">
<canvas id="canvasTop" class="chartCanvas"></canvas>
<div id="paneTopBadge" class="paneBadge">M1</div>
<div id="modeTopBadge" class="modeBadge">練習</div>
</div>
<div class="chartPane hidden" id="paneBottom">
<canvas id="canvasBottom" class="chartCanvas"></canvas>
<div id="paneBottomBadge" class="paneBadge">M15</div>
<div id="modeBottomBadge" class="modeBadge">練習</div>
</div>
</div>

<div class="infoBar">
<div class="infoItem"><div class="k">状態</div><div id="infoState" class="v">flat</div></div>
<div class="infoItem"><div class="k">Entry</div><div id="infoEntry" class="v">-</div></div>
<div class="infoItem"><div class="k">SL / TP</div><div id="infoSlTp" class="v">-</div></div>
<div class="infoItem"><div class="k">含み損益</div><div id="infoPnl" class="v">-</div></div>
<button id="manageBtn" class="tinyBtn">管理</button>
</div>

<div class="replayBar">
<button id="backBtn" class="replayBtn">◀</button>
<button id="playToggleBtn" class="replayBtn">▶</button>
<button id="forwardBtn" class="replayBtn">▶▶</button>
</div>

<div class="tradeBar">
<button id="sellBtn" class="tradeBtn sellBtn">SELL</button>
<button id="closeBtn" class="tradeBtn closeBtn">CLOSE</button>
<button id="buyBtn" class="tradeBtn buyBtn">BUY</button>
</div>
</section>

<section id="statsScreen" class="screen">
<div class="statsHeader">
<button id="backToChartBtn" class="backBtn">←</button>
<div class="statsTabs">
<button class="tabBtn actionBtn primary" data-tab="graphs">グラフ</button>
<button class="tabBtn actionBtn" data-tab="summary">集計</button>
<button class="tabBtn actionBtn" data-tab="opt">イグジット</button>
</div>
</div>
<div class="statsMain">
<div id="tab-graphs" class="tabPane">
<div class="card">
<h3>Equityカーブ（累積R）</h3>
<div class="graphBox"><canvas id="equityCanvas" class="graphCanvas"></canvas></div>
</div>
<div class="card">
<h3>JST時間帯別</h3>
<div class="graphBox"><canvas id="hourCanvas" class="graphCanvas"></canvas></div>
</div>
<div class="card">
<h3>R分布</h3>
<div class="graphBox"><canvas id="histCanvas" class="graphCanvas"></canvas></div>
</div>
</div>

<div id="tab-summary" class="tabPane hidden">
<div class="card">
<h3>全体統計</h3>
<div id="metricGrid" class="metricGrid"></div>
</div>
<div class="card">
<div class="switchRow">
<div>
<div class="switchText">時間帯統計（JST、エントリー時刻基準）</div>
<div class="switchSub">詳細モードで10分刻み</div>
</div>
<button id="detailTimeSwitch" class="switch"></button>
</div>
<div id="timeStatsWrap" class="tableWrap"></div>
</div>
<div class="card">
<h3>統計保存</h3>
<div class="rowBtns">
<button id="downloadJsonBtn" class="settingBtn">JSON保存</button>
<button id="downloadTxtBtn" class="settingBtn">TXT保存</button>
</div>
</div>
<div class="card">
<h3>トレード一覧</h3>
<div id="tradeTableWrap" class="tableWrap"></div>
</div>
</div>

<div id="tab-opt" class="tabPane hidden">
<div class="card">
<h3>N本後決済</h3>
<div id="bestNBadge" class="badge">-</div>
<div class="graphBox" style="margin-top:6px"><canvas id="holdCanvas" class="graphCanvas"></canvas></div>
<div id="holdTableWrap" class="tableWrap"></div>
</div>
<div class="card">
<h3>RR固定TP</h3>
<div id="bestRRBadge" class="badge">-</div>
<div class="graphBox" style="margin-top:6px"><canvas id="rrCanvas" class="graphCanvas"></canvas></div>
<div id="rrTableWrap" class="tableWrap"></div>
</div>
</div>

<div class="card">
<h3>ファイル</h3>
<div class="rowBtns" style="margin-bottom:8px">
<button id="newFileBtn" class="settingBtn">新規ファイル</button>
<button id="deleteFileBtn" class="settingBtn">削除</button>
</div>
<div id="fileList"></div>
</div>

<div class="card">
<h3>設定</h3>
<div class="switchRow">
<div>
<div class="switchText">現在価格ライン</div>
<div class="switchSub">黒実線の現在価格ラインを表示</div>
</div>
<button id="currentPriceSwitch" class="switch on"></button>
</div>
<div class="switchRow">
<div>
<div class="switchText">水平線ダブルタップ削除</div>
<div class="switchSub">ONで分析ラインをダブルタップ削除</div>
</div>
<button id="doubleDeleteSwitch" class="switch"></button>
</div>
</div>
</div>
</section>
</div>

<div id="menuOverlay" class="overlay">
<div class="backdrop"></div>
<div class="menuPanel">
<button id="gotoStatsBtn" class="menuItem">統計画面</button>
<button id="openOrderSheetBtn" class="menuItem">注文 / SL / TP</button>
<button id="addCurrentLineBtn" class="menuItem">現在価格に水平線</button>
</div>
</div>

<div id="confirmModal" class="modal">
<div class="backdrop"></div>
<div class="modalPanel">
<div id="confirmTitle" class="modalTitle">確認</div>
<div id="confirmMsg" class="modalMsg">実行しますか？</div>
<div class="modalBtns">
<button id="confirmCancelBtn" class="actionBtn">キャンセル</button>
<button id="confirmOkBtn" class="actionBtn primary">OK</button>
</div>
</div>
</div>

<div id="orderSheet" class="sheet">
<div class="backdrop"></div>
<div class="sheetPanel">
<div class="sheetTitle">注文 / SL / TP</div>
<div id="lineInfo" class="note" style="margin-bottom:8px">選択ライン: なし</div>
<div class="field">
<label>注文タイプ</label>
<select id="orderTypeSelect">
<option value="market_buy">Market Buy</option>
<option value="market_sell">Market Sell</option>
<option value="buy_limit">Buy Limit</option>
<option value="sell_limit">Sell Limit</option>
<option value="buy_stop">Buy Stop</option>
<option value="sell_stop">Sell Stop</option>
</select>
</div>
<div class="sheetGrid">
<div class="field">
<label>価格</label>
<input id="orderPriceInput" type="number" step="0.01">
</div>
<div class="field">
<label>SL</label>
<input id="slInput" type="number" step="0.01">
</div>
<div class="field">
<label>TP</label>
<input id="tpInput" type="number" step="0.01">
</div>
<div class="field">
<label>高速倍率</label>
<input id="fastInputSheet" type="number" step="1" min="1" max="50">
</div>
</div>
<div class="sheetActions">
<button id="applyOrderBtn" class="sheetBtn">適用</button>
<button id="lineToPriceBtn" class="sheetBtn">選択ラインを価格へ</button>
<button id="lineToSlTpBtn" class="sheetBtn">選択ラインをSL/TPへ</button>
<button id="deleteLineBtn" class="sheetBtn">選択ライン削除</button>
<button id="cancelPendingBtn" class="sheetBtn">保留注文取消</button>
<button id="closeOrderSheetBtn" class="sheetBtn">閉じる</button>
</div>
</div>
</div>

<div id="manageSheet" class="sheet">
<div class="backdrop"></div>
<div class="sheetPanel">
<div class="sheetTitle">注文管理</div>
<div class="sheetGrid">
<div class="field">
<label>SL</label>
<input id="manageSlInput" type="number" step="0.01">
</div>
<div class="field">
<label>TP</label>
<input id="manageTpInput" type="number" step="0.01">
</div>
</div>
<div class="sheetActions">
<button id="applyManageBtn" class="sheetBtn">SL/TP更新</button>
<button id="manageCloseBtn" class="sheetBtn">クローズ / 取消</button>
<button id="closeManageSheetBtn" class="sheetBtn">閉じる</button>
</div>
</div>
</div>

<div id="lineContextMenu" class="contextMenu">
<div class="backdrop"></div>
<div id="lineCtxPanel" class="ctxPanel">
<button class="ctxBtn" data-action="buy_limit">Buy Limit</button>
<button class="ctxBtn" data-action="sell_limit">Sell Limit</button>
<button class="ctxBtn" data-action="buy_stop">Buy Stop</button>
<button class="ctxBtn" data-action="sell_stop">Sell Stop</button>
<button class="ctxBtn" data-action="delete">削除</button>
</div>

function pseudo(seed){
const x = Math.sin(seed12.9898 + 78.233) 43758.5453123;
return x - Math.floor(x);
} function gauss(seed){
const u = Math.max(1e-9,pseudo(seed));
const v = Math.max(1e-9,pseudo(seed*1.731+9.1));
return Math.sqrt(-2Math.log(u))Math.cos(2Math.PIv);
} function getTfStep(tf){ return tf==='M1' ? 1 : tf==='M15' ? 15 : 60; }

function generateM1Data(days=7,seedBase=12345){
const out=[];
const start = Date.UTC(2026,4,18,0,0,0);
let price = 2310 + pseudo(seedBase)*40;
const total = days * 24 * 60;
for(let i=0;i<total;i++){
const ts = start + i*60000;
const d = new Date(ts);
const h = d.getUTCHours();
const minute = d.getUTCMinutes();
let vol = 0.16;
let drift = 0;
let spikeProb = 0.002;

if(h < 8){
vol = 0.10 + pseudo(seedBase+i0.27)0.06;
drift = Math.sin((i+seedBase)/140)*0.010;
spikeProb = 0.002;
}else if(h < 13){
vol = 0.28 + pseudo(seedBase+i0.61)0.16;
drift = Math.sin((i+seedBase)/38)0.04 + (pseudo(seedBase+i0.91)-0.5)*0.03;
spikeProb = 0.008;
}else{
vol = 0.36 + pseudo(seedBase+i1.17)0.24;
drift = Math.sin((i+seedBase)/25)0.06 + (pseudo(seedBase+i1.71)-0.5)*0.05;
spikeProb = 0.010;
}

if((h===12||h===13||h===14||h===20) && minute<15){ vol *= 1.18; spikeProb += 0.004; }
if(pseudo(seedBase+i2.37) > 0.995){ drift += (pseudo(seedBase+i3.8)-0.5)*0.9; }
const open = price;
let delta = gauss(seedBase+i+1) * vol + drift;
if(pseudo(seedBase+i*4.11) > 1-spikeProb){
delta += (pseudo(seedBase+i7.3)-0.5) (1.8 + vol*2.6);
}
let close = open + delta;
let wickUp = Math.abs(gauss(seedBase+i+91)) * vol * (0.55 + pseudo(seedBase+i+17));
let wickDn = Math.abs(gauss(seedBase+i+191)) * vol * (0.55 + pseudo(seedBase+i+27));
let high = Math.max(open,close) + wickUp;
let low = Math.min(open,close) - wickDn;
if(pseudo(seedBase+i6.2) > 0.9925) high += pseudo(seedBase+i+321)2.4;
if(pseudo(seedBase+i6.7) > 0.9925) low -= pseudo(seedBase+i+654)2.4;
close = clamp(close,2260,2460);
high = Math.max(high,open,close);
low = Math.min(low,open,close);

out.push({
index:i,
time:ts,
open:round2(open),
high:round2(high),
low:round2(low),
close:round2(close),
utc:formatUTC(ts),
jst:formatJST(ts)
});
price = close;
}
return out;
}

function resampleBars(src,step,tf){
const out=[];
for(let i=0;i<src.length;i+=step){
const chunk = src.slice(i,i+step);
if(!chunk.length) continue;
out.push({
index:out.length,
srcStart:i,
srcEnd:i+chunk.length-1,
time:chunk.time,
open:chunk.open,
high:Math.max(...chunk.map(v=>v.high)),
low:Math.min(...chunk.map(v=>v.low)),
close:chunk[chunk.length-1].close,
utc:chunk.utc,
jst:chunk.jst,
tf
});
}
return out;
}

state.currentFileId = data.currentFileId || null;
state.files = data.files || {};

state.fileOrder.forEach(id=>{
const f = state.files[id];
if(!f) return;
f.replay = Object.assign(defaultReplay(), f.replay || {});
f.replay.visibleCount = Object.assign(defaultReplay().visibleCount, f.replay.visibleCount || {});
f.replay.defaultVisible = Object.assign(defaultReplay().defaultVisible, f.replay.defaultVisible || {});
f.replay.centerByTf = Object.assign(defaultReplay().centerByTf, f.replay.centerByTf || {});

f.tradeState.markerLog = Array.isArray(f.tradeState.markerLog) ? f.tradeState.markerLog : [];
f.drawing = f.drawing || {lines:[]};
f.drawing.lines = Array.isArray(f.drawing.lines) ? f.drawing.lines : [];
f.trades = Array.isArray(f.trades) ? f.trades : [];
if(!f.data || !f.data.M1 || !f.data.M15 || !f.data.H1){
const m1 = generateM1Data(7, Math.floor(Math.random()*1e8));
f.data = {M1:m1,M15:resampleBars(m1,15,'M15'),H1:resampleBars(m1,60,'H1')};
}
});

if(!state.currentFileId || !state.files[state.currentFileId]) throw new Error('invalid file');
return true;
}catch(e){
try{ localStorage.removeItem(STORAGE_KEY); }catch(err){}
return false;
}
}

function ensureCenter(tf){
const file = currentFile();
const step = getTfStep(tf);
const maxIdx = Math.floor(file.replay.currentM1/step);
if(file.replay.centerByTf[tf]==null) file.replay.centerByTf[tf] = maxIdx;
}

function visibleRange(tf){
const file = currentFile();
const step = getTfStep(tf);
const vis = file.replay.visibleCount[tf];
const maxIdx = Math.floor(file.replay.currentM1/step);
ensureCenter(tf);
let center = file.replay.centerByTf[tf];
center = clamp(center, Math.floor(vis/2), Math.max(Math.floor(vis/2), maxIdx));
let start = Math.round(center - vis/2);
let end = start + vis - 1;
end = Math.min(end, maxIdx);
start = Math.max(0, end - vis + 1);
return {start,end,maxIdx,vis,center};
}

function resizeCanvas(canvas){

const w = Math.max(10, Math.round(rect.width*dpr));

if(canvas.width !== w || canvas.height !== h){

canvas.height = h;
}

function buildTradeRecord(reason, closePrice){
const pos = currentPos();
if(pos.positionStatus !== 'open') return null;
const closeBar = currentFile().replay.currentM1;
const openBar = pos.entryBar;
const openTs = bars('M1')[openBar].time;
const closeTs = bars('M1')[closeBar].time;
const jst = new Date(openTs + 936001000);
const risk = pos.sl != null ? Math.abs(pos.entry - pos.sl) : null;
const pnl = pos.side === 'buy' ? closePrice - pos.entry : pos.entry - closePrice;
return {
id:uid('trade'),
side:pos.side,
orderType:pos.orderType,
entry:round2(pos.entry),
closePrice:round2(closePrice),
sl:pos.sl != null ? round2(pos.sl) : null,
tp:pos.tp != null ? round2(pos.tp) : null,
openBar,
closeBar,
openTime:bars('M1')[openBar].utc,
closeTime:bars('M1')[closeBar].utc,
openTimeJST:formatJST(openTs),
closeTimeJST:formatJST(closeTs),
closeReason:reason,
status:reason==='tp' ? 'closed_tp' : reason==='sl' ? 'closed_sl' : 'closed_manual',
risk:risk != null ? round2(risk) : null,
pnl:round2(pnl),
resultR:risk ? round2(pnl/risk) : null,
entryHourJST:jst.getUTCHours(),
entryMinuteJST:jst.getUTCMinutes(),
entrySlot1h:jst.getUTCHours(),
entrySlot10m:jst.getUTCHours()*6 + Math.floor(jst.getUTCMinutes()/10)
};
}

function closeOpenPosition(reason='manual', priceOverride=null){
const pos = currentPos();
if(pos.positionStatus !== 'open') return false;
const exitPrice = round2(priceOverride != null ? priceOverride : currentPrice());
const rec = buildTradeRecord(reason, exitPrice);
if(!rec) return false;
currentFile().trades.push(rec);
pos.markerLog.push({id:uid('mk'),type:'exit',m1Index:currentFile().replay.currentM1,price:exitPrice,reason});
resetPositionCore();
renderAll();
saveState();
return true;
}

function clearPending(){

const keepSl = pos.sl;
const keepTp = pos.tp;

pos.sl = keepSl;
pos.tp = keepTp;
renderAll();
saveState();
return true;
}

function maybeFillPending(bar){
const pos = currentPos();
if(pos.positionStatus !== 'pending') return;
const p = pos.pendingPrice;
let hit = false;
if(pos.orderType === 'buy_limit' && bar.low <= p) hit = true;
if(pos.orderType === 'sell_limit' && bar.high >= p) hit = true;
if(pos.orderType === 'buy_stop' && bar.high >= p) hit = true;
if(pos.orderType === 'sell_stop' && bar.low <= p) hit = true;
if(hit){
pos.positionStatus = 'open';
pos.entry = round2(p);
pos.entryBar = bar.index;
pos.entryTime = bar.utc;
pos.risk = pos.sl != null ? round2(Math.abs(pos.entry - pos.sl)) : null;
pos.markerLog.push({id:uid('mk'),type:'entry',m1Index:bar.index,price:pos.entry,side:pos.side,pendingFill:true});
}
}

function maybeHitSlTp(bar){
const pos = currentPos();
if(pos.positionStatus !== 'open') return;
const sl = pos.sl;
const tp = pos.tp;
if(pos.side === 'buy'){
const slHit = sl != null && bar.low <= sl;
const tpHit = tp != null && bar.high >= tp;
if(slHit) closeOpenPosition('sl', sl);
else if(tpHit) closeOpenPosition('tp', tp);
}else{
const slHit = sl != null && bar.high >= sl;
const tpHit = tp != null && bar.low <= tp;
if(slHit) closeOpenPosition('sl', sl);
else if(tpHit) closeOpenPosition('tp', tp);
}
}

function stepReplay(n=1, forward=true){
const file = currentFile();
const m1 = bars('M1');
if(forward){
for(let i=0;i<n;i++){
if(file.replay.currentM1 >= m1.length-1) break;
file.replay.currentM1++;
const bar = m1[file.replay.currentM1];
maybeFillPending(bar);
maybeHitSlTp(bar);
}
file.replay.furthestM1 = Math.max(file.replay.furthestM1, file.replay.currentM1);
}else{
if(state.mode === 'practice') return;
file.replay.currentM1 = Math.max(0, file.replay.currentM1 - n);
}

['M1','M15','H1'].forEach(tf=>{
const step = getTfStep(tf);
const maxIdx = Math.floor(file.replay.currentM1/step);
const vis = file.replay.visibleCount[tf];
const cur = file.replay.centerByTf[tf] == null ? maxIdx : file.replay.centerByTf[tf];
if(forward){
file.replay.centerByTf[tf] = Math.max(Math.floor(vis/2), maxIdx - Math.floor(vis*0.28));
}else{
file.replay.centerByTf[tf] = clamp(cur, Math.floor(vis/2), Math.max(Math.floor(vis/2), maxIdx));
}
});
renderAll();
saveState();
}

const interval = fast ? 90 : baseInterval;

}

ctx.fillRect(0,0,w,h);

const allBars = bars(tf);
const range = visibleRange(tf);
const visible = allBars.slice(range.start, range.end+1);

const plotW = w - state.chart.priceAxisWidth;

let min = Math.min(...visible.map(v=>v.low));
let max = Math.max(...visible.map(v=>v.high));

[currentPrice(), pos.entry, pos.pendingPrice, pos.sl, pos.tp].forEach(v=>{

max = Math.max(max,line.price);

const yOf = p => (max - p) / (max - min || 1) * (h - 20) + 10;
const meta = {tf,paneKey,w,h,plotW,min,max,yOf,range,visible};
canvas._meta = meta;

ctx.strokeStyle = css('--grid');

for(let i=0;i<=5;i++){

ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(plotW,y); ctx.stroke();
}
const cols = Math.min(7, Math.max(2, visible.length-1));
for(let i=0;i<=cols;i++){
const x = plotW*i/cols;
ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
}

const candleW = Math.max(2, Math.floor(plotW/visible.length*0.62));
visible.forEach((b,i)=>{
const x = plotW*(i+0.5)/visible.length;
const yH = yOf(b.high), yL = yOf(b.low), yO = yOf(b.open), yC = yOf(b.close);

const top = Math.min(yO,yC);
const body = Math.max(2, Math.abs(yC-yO));
ctx.fillRect(x-candleW/2, top, candleW, body);

const currentTfIndex = Math.floor(currentFile().replay.currentM1 / getTfStep(tf));

currentFile().drawing.lines.forEach(line=>{

function computeStats(trades){
const valid = trades.filter(t=>typeof t.resultR === 'number' && !Number.isNaN(t.resultR));
const total = trades.length;
const wins = valid.filter(t=>t.resultR > 0);
const losses = valid.filter(t=>t.resultR < 0);
const avgR = valid.length ? valid.reduce((a,b)=>a+b.resultR,0)/valid.length : 0;
const winRate = total ? wins.length / total * 100 : 0;
const totalWinR = wins.reduce((a,b)=>a+b.resultR,0);
const totalLossR = Math.abs(losses.reduce((a,b)=>a+b.resultR,0));
const pf = totalLossR ? totalWinR/totalLossR : (totalWinR>0 ? Infinity : 0);
const expectancy = avgR;
const avgProfitR = wins.length ? wins.reduce((a,b)=>a+b.resultR,0)/wins.length : 0;
const avgLossR = losses.length ? Math.abs(losses.reduce((a,b)=>a+b.resultR,0)/losses.length) : 0;
const rr = avgLossR ? avgProfitR / avgLossR : 0;
let maxWinStreak=0,maxLoseStreak=0,w=0,l=0;
valid.forEach(t=>{
if(t.resultR > 0){ w++; l=0; maxWinStreak=Math.max(maxWinStreak,w); }
else if(t.resultR < 0){ l++; w=0; maxLoseStreak=Math.max(maxLoseStreak,l); }
else{ w=0; l=0; }
});
return {total,winRate,avgR,pf,expectancy,maxWinStreak,maxLoseStreak,rr,avgProfitR,avgLossR};
}

function timeStats(trades,detail=false){
const size = detail ? 144 : 24;
const buckets = Array.from({length:size},()=>[]);
trades.forEach(t=>{
const idx = detail ? t.entrySlot10m : t.entrySlot1h;
if(idx >= 0 && idx < size) buckets[idx].push(t);
});
return buckets.map((arr,i)=>{
const s = computeStats(arr);
return {slot:i,count:arr.length,winRate:s.winRate,pf:s.pf,avgR:s.avgR};
});
}

} function histSeries(trades){

});
return bins;
}

const w = canvas.width, h = canvas.height;
ctx.clearRect(0,0,w,h);
ctx.fillStyle = css('--panel2');

const pw = w-pad.l-pad.r, ph = h-pad.t-pad.b;
ctx.strokeStyle = css('--border');
ctx.strokeRect(pad.l,pad.t,pw,ph);

let values = [];
cfg.datasets.forEach(ds=>values = values.concat(ds.data.filter(v=>typeof v==='number' && Number.isFinite(v))));
if(!values.length) values = ;
const minY = Math.min(0, Math.min(...values));
const maxY = Math.max(1, Math.max(...values));
const yOf = v => pad.t + (maxY-v)/(maxY-minY || 1) * ph;

for(let i=0;i<5;i++){
const v = minY + (maxY-minY)*i/4;
const y = yOf(v);
ctx.strokeStyle = css('--grid');

ctx.fillStyle = css('--muted');

if(cfg.type === 'bar' || cfg.type === 'hist'){

const groupW = pw/n;

const barW = (groupW*0.72) / cfg.datasets.length;
const x = pad.l + igroupW + groupW0.14 + di*barW;

ctx.fillStyle = ds.color;

const x = pad.l + (cfg.labels.length<=1 ? pw/2 : pw*i/Math.max(1,cfg.labels.length-1));
ctx.fillText(String(lab), x-10, h-6);
});
}

function optimizeHold(trades){
const out=[];
for(let n=1;n<=20;n++){
const sim = trades.map(t=>{
if(typeof t.resultR !== 'number') return {...t,resultR:null};
const held = Math.max(1, t.closeBar - t.openBar);
const base = t.resultR;
let r;
if(base > 0){
const factor = Math.min(1.7, 0.45 + n/(held+1));
r = base * factor * 0.92;
}else{
r = base * (1 + n*0.014);
}
return {...t,resultR:round2(r)};
});
const s = computeStats(sim);
out.push({n,winRate:s.winRate,pf:s.pf,expectancy:s.expectancy});
}
return out;
}

function optimizeRR(trades){
const out=[];
for(let rr=1; rr<=5.001; rr+=0.5){
const sim = trades.map(t=>{
if(typeof t.resultR !== 'number') return {...t,resultR:null};
let r;
if(t.resultR >= rr) r = rr;
else if(t.resultR > 0) r = -1;
else r = -1;
return {...t,resultR:round2(r)};
});
const s = computeStats(sim);
out.push({rr:round2(rr),winRate:s.winRate,pf:s.pf,expectancy:s.expectancy});
}
return out;
}

function exportStats(type){
const file = currentFile();
const stats = computeStats(file.trades);
const payload = {file:file.name, stats, trades:file.trades};
let blob,name;
if(type === 'json'){
blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
name = ${file.name.replace(/\s+/g,'_')}_stats.json;
}else{
const lines = [
file: ${file.name},
total: ${stats.total},
winRate: ${fmt(stats.winRate,1)}%,
avgR: ${fmt(stats.avgR,2)},
PF: ${stats.pf===Infinity?'∞':fmt(stats.pf,2)},
Expectancy: ${fmt(stats.expectancy,2)},
maxWinStreak: ${stats.maxWinStreak},
maxLoseStreak: ${stats.maxLoseStreak},
RR: ${fmt(stats.rr,2)},
'',
'Trades:',
...file.trades.map(t=>${t.openTimeJST} | ${t.side} | entry ${fmt(t.entry,2)} | close ${fmt(t.closePrice,2)} | ${t.closeReason} | R ${t.resultR==null?'-':fmt(t.resultR,2)})
];
blob = new Blob([lines.join('\n')],{type:'text/plain'});
name = ${file.name.replace(/\s+/g,'_')}_stats.txt;
}
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = name;
document.body.appendChild(a);
a.click();
setTimeout(()=>{
URL.revokeObjectURL(a.href);
a.remove();
},200);
}

function bindCanvas(canvas){
let start = null;
let dragging = false;
let dragType = null;
let dragLineId = null;
let longPressTimer = null;
let pinchStartDist = null;
let pinchStartVis = null;

function points(e){
if(e.touches) return Array.from(e.touches).map(t=>({x:t.clientX,y:t.clientY}));
return [{x:e.clientX,y:e.clientY}];
}
function localPoint(clientX,clientY){
const rect = canvas.getBoundingClientRect();
return {x:clientX-rect.left, y:clientY-rect.top, rect};
}
function meta(){ return canvas._meta; }
function axisHit(pt,m){ return pt.x >= pt.rect.width - state.chart.priceAxisWidth; }
function priceAt(pt,m){
const scaleY = canvas.height / pt.rect.height;
const y = pt.y * scaleY;
return round2(m.max - (y-10)/(m.h-20)*(m.max-m.min));
}
function pinchDist(ps){
const dx = ps.x-ps.x;
const dy = ps.y-ps.y;
return Math.sqrt(dxdx+dydy);
}
function lineHit(pt,m){
const rect = canvas.getBoundingClientRect();
const scaleY = canvas.height / rect.height;
const y = pt.y * scaleY;
let best = null;
let bestD = 14 * scaleY;
const pos = currentPos();
const candidates = [
...currentFile().drawing.lines.map(v=>({kind:'analysis',id:v.id,price:v.price})),
...(pos.sl!=null?[{kind:'sl',id:'sl',price:pos.sl}]:[]),
...(pos.tp!=null?[{kind:'tp',id:'tp',price:pos.tp}]:[])
];
candidates.forEach(c=>{
const cy = m.yOf(c.price);
const d = Math.abs(cy-y);
if(d < bestD){ bestD = d; best = c; }
});
return best;
}

function startPress(e){
const m = meta();
if(!m) return;
const ps = points(e);
if(ps.length === 2){
pinchStartDist = pinchDist(ps);
pinchStartVis = currentFile().replay.visibleCount[m.tf];
clearTimeout(longPressTimer);
return;
}
const pt = localPoint(ps.x,ps.y);
start = pt;
dragging = false;
dragType = null;
dragLineId = null;
const hit = lineHit(pt,m);
if(hit){
if(hit.kind === 'analysis'){ dragType = 'analysis'; dragLineId = hit.id; }
if(hit.kind === 'sl'){ dragType = 'sl'; }
if(hit.kind === 'tp'){ dragType = 'tp'; }
}
longPressTimer = setTimeout(()=>{
if(axisHit(pt,m)){
addAnalysisLine(priceAt(pt,m));
}else{
const currentHit = lineHit(pt,m);
if(currentHit && currentHit.kind === 'analysis'){
const line = currentFile().drawing.lines.find(v=>v.id===currentHit.id);
if(line) openLineMenu(line, ps.x, ps.y);
}
}
}, 420);
}

function movePress(e){
const m = meta();
if(!m) return;
const ps = points(e);

if(ps.length===2 && pinchStartDist){
e.preventDefault();
clearTimeout(longPressTimer);
dragging = true;
const ratio = pinchStartDist / pinchDist(ps);
const minVis = m.tf==='M1' ? 18 : m.tf==='M15' ? 12 : 8;
const maxVis = m.tf==='M1' ? 160 : m.tf==='M15' ? 120 : 90;
currentFile().replay.visibleCount[m.tf] = clamp(Math.round(pinchStartVis*ratio), minVis, maxVis);
renderChart();
return;
}

if(!start || !ps.length) return;
const pt = localPoint(ps.x,ps.y);
const dx = pt.x - start.x;
const dy = pt.y - start.y;
if(Math.abs(dx)>6 || Math.abs(dy)>6){
dragging = true;
clearTimeout(longPressTimer);
}
if(!dragging) return;

e.preventDefault();
if(dragType === 'analysis'){
const line = currentFile().drawing.lines.find(v=>v.id===dragLineId);
if(line){
line.price = priceAt(pt,m);
setSelectedLine(line.id);
renderChart();
saveState();
}
}else if(dragType === 'sl'){
const pos = currentPos();
pos.sl = priceAt(pt,m);
if(pos.positionStatus==='open' && pos.entry!=null && pos.sl!=null){
pos.risk = round2(Math.abs(pos.entry-pos.sl));
}
renderChart();
saveState();
}else if(dragType === 'tp'){
const pos = currentPos();
pos.tp = priceAt(pt,m);
renderChart();
saveState();
}else{
const tf = m.tf;
const file = currentFile();
const usableW = Math.max(1, canvas.getBoundingClientRect().width - state.chart.priceAxisWidth);
const movedBars = Math.round(-dx / usableW * file.replay.visibleCount[tf]);
const maxIdx = Math.floor(file.replay.currentM1/getTfStep(tf));
const cur = file.replay.centerByTf[tf] == null ? maxIdx : file.replay.centerByTf[tf];
file.replay.centerByTf[tf] = clamp(cur + movedBars, Math.floor(file.replay.visibleCount[tf]/2), Math.max(Math.floor(file.replay.visibleCount[tf]/2), maxIdx));
start = pt;
renderChart();
}
}

function endPress(e){
const m = meta();
clearTimeout(longPressTimer);
if(!m){ start=null; dragging=false; pinchStartDist=null; pinchStartVis=null; return; }
const changed = e.changedTouches ? Array.from(e.changedTouches).map(t=>({x:t.clientX,y:t.clientY})) : [{x:e.clientX,y:e.clientY}];
if(!changed.length){ start=null; dragging=false; pinchStartDist=null; pinchStartVis=null; return; }
const pt = localPoint(changed.x, changed.y);
const now = Date.now();
const last = state.transient.lastTapByCanvas.get(canvas) || 0;
const doubleTap = now - last < 280;

if(!dragging){
if(axisHit(pt,m)){
if(doubleTap) resetView(m.tf);
}else{
const hit = lineHit(pt,m);
if(hit && hit.kind === 'analysis'){
setSelectedLine(hit.id);
if(state.ui.lineDoubleDelete && doubleTap){
deleteLine(hit.id);
}else{
renderChart();
}
}else if(!hit){
if(!setSlTpByTap(priceAt(pt,m))){
setSelectedLine(null);
renderChart();
}
}
}
}

state.transient.lastTapByCanvas.set(canvas, now);
start = null;
dragging = false;
dragType = null;
dragLineId = null;
pinchStartDist = null;
pinchStartVis = null;
}

['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,startPress,{passive:false}));
['mousemove','touchmove'].forEach(ev=>canvas.addEventListener(ev,movePress,{passive:false}));
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>canvas.addEventListener(ev,endPress,{passive:false}));
}

function attachHold(btn, shortFn, longFn, endFn){
let firedLong = false;
let timer = null;
const start = ()=>{
firedLong = false;
timer = setTimeout(()=>{
firedLong = true;
longFn();
}, 280);
};
const end = ()=>{
clearTimeout(timer);
if(firedLong){
endFn && endFn();
}else{
shortFn && shortFn();
}
};
['mousedown','touchstart'].forEach(ev=>btn.addEventListener(ev,start,{passive:true}));
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>btn.addEventListener(ev,end));
}

attachHold(
el.forwardBtn,
()=>stepReplay(1,true),
()=>startPlayback(1,true),
()=>stopPlayback()
);
attachHold(
el.backBtn,
()=>{ if(state.mode==='review') stepReplay(1,false); },
()=>{ if(state.mode==='review') startPlayback(-1,true); },
()=>{ if(state.mode==='review') stopPlayback(); }
);

}

function bootstrap(){
if(!loadState()){
const f1 = createFile('XAU Sample 1');
const f2 = createFile('XAU Sample 2');
state.files[f1.id] = f1;
state.files[f2.id] = f2;
state.fileOrder = [f1.id, f2.id];
state.currentFileId = f1.id;
state.ui = Object.assign(state.ui, defaultSettings());
saveState();
}
syncPaneTfs();
applyTheme();
bindEvents();
updateHeaderUI();
if(state.screen === 'stats') setScreen('stats');
else setScreen('chart');
}

bootstrap();
})();
