<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>XAUUSD Practice</title>
<style>
:root{
  --bg:#0d1117;
  --panel:#141a22;
  --panel2:#1b2330;
  --text:#e7edf5;
  --muted:#8f9aaa;
  --line:#303949;
  --accent:#d6a94a;
  --buy:#1fa774;
  --sell:#d54f58;
  --btn:#202a38;
  --shadow:rgba(0,0,0,.24);
  --chart:#0b1017;
  --grid:#202938;
  --axis:#b9c0cc;
}
body.verify{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --panel2:#eef1f5;
  --text:#1a1d22;
  --muted:#687282;
  --line:#d8dde5;
  --accent:#b8871c;
  --buy:#138d63;
  --sell:#c63d47;
  --btn:#eef1f5;
  --shadow:rgba(0,0,0,.10);
  --chart:#fbfcfe;
  --grid:#e5e9f0;
  --axis:#323842;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select{font:inherit;color:inherit}
button{border:1px solid var(--line);background:var(--btn);border-radius:7px;height:30px;padding:0 8px;cursor:pointer}
button:active{transform:translateY(1px)}
.app{height:100%;display:flex;flex-direction:column;background:var(--bg)}
.topbar{flex:0 0 auto;padding:5px 6px 3px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 4px var(--shadow);z-index:5}
.row{display:grid;gap:4px;align-items:center;margin-bottom:4px}
.row1{grid-template-columns:auto minmax(0,1fr) auto auto}
.row2{grid-template-columns:minmax(0,.98fr) minmax(0,.76fr) auto}
.segment{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;height:30px;background:var(--panel2)}
.segment button{height:28px;border:0;border-radius:0;background:transparent;padding:0 7px;font-size:12px;white-space:nowrap}
.segment button.active{background:var(--accent);color:#111;font-weight:700}
.speedBox{display:grid;grid-template-columns:auto minmax(62px,1fr) 42px;gap:4px;align-items:center;height:30px}
.speedLabel{font-size:10px;color:var(--muted);min-width:34px;text-align:right}
.speedBox input[type=range]{width:100%;height:22px;accent-color:var(--accent)}
.speedBox input[type=number]{width:42px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel2);text-align:center;font-size:12px;padding:0}
.smallBtn{min-width:34px;font-size:12px}
.menuBtn{width:34px;font-size:18px;line-height:1}
.sessionBtns,.tfBtns,.sltpBtns{display:flex;gap:4px;min-width:0}
.sessionBtns button,.tfBtns button,.sltpBtns button{font-size:11px;padding:0 6px;min-width:0;flex:1}
.sltpBtns button{flex:0 0 auto;width:34px}
button.hot{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.info{height:25px;display:grid;grid-template-columns:1.1fr 1fr 1.3fr 1fr;gap:4px;align-items:center;padding:0 7px;border-bottom:1px solid var(--line);background:var(--panel2);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden}
.info b{color:var(--text);font-weight:600}
.charts{position:relative;flex:1 1 auto;min-height:0;background:var(--chart);display:flex;flex-direction:column;gap:1px;touch-action:none}
.chartWrap{position:relative;flex:1 1 0;min-height:0;background:var(--chart);overflow:hidden}
.chartWrap.single{flex:1 1 auto}
.chartWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.chartLabel{position:absolute;left:6px;top:5px;font-size:11px;color:var(--muted);background:color-mix(in srgb,var(--chart) 78%,transparent);padding:2px 5px;border-radius:5px;pointer-events:none}
.lineMenu{position:fixed;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 22px var(--shadow);padding:4px;display:none}
.lineMenu button{display:block;width:124px;text-align:left;margin:2px 0;font-size:12px;height:30px}
.tradeBtns{height:58px;display:grid;grid-template-columns:1fr .9fr 1fr;gap:6px;padding:5px 7px calc(5px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line)}
.tradeBtns button{height:48px;border-radius:8px;font-size:16px;font-weight:800;letter-spacing:0}
.sellBtn{background:linear-gradient(180deg,#df646c,var(--sell));color:#fff;border-color:#b73740}
.buyBtn{background:linear-gradient(180deg,#2ebb88,var(--buy));color:#fff;border-color:#137b58}
.closeBtn{background:var(--panel2);border-color:var(--accent);color:var(--text)}
.replay{position:absolute;left:50%;bottom:7px;transform:translateX(-50%);display:flex;gap:7px;z-index:4;background:color-mix(in srgb,var(--panel) 86%,transparent);padding:4px;border:1px solid var(--line);border-radius:9px;box-shadow:0 4px 12px var(--shadow)}
.replay button{width:44px;height:34px;font-weight:800;font-size:15px}
.sheetBg,.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:30;display:none}
.sheet{position:absolute;right:8px;top:48px;width:min(280px,calc(100vw - 16px));background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px var(--shadow);padding:7px}
.sheet button{width:100%;height:36px;text-align:left;margin:3px 0;background:var(--panel2)}
.fileName{font-size:12px;color:var(--muted);padding:4px 4px 7px;border-bottom:1px solid var(--line);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(350px,calc(100vw - 26px));max-height:86vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 14px 32px var(--shadow);padding:12px}
.modal h2{font-size:16px;margin:0 0 10px}
.field{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.field input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
.field input[type=number],.field input[type=text],.field select{width:150px;height:32px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);padding:0 8px}
.fileList{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.fileList button{height:38px;text-align:left;background:var(--panel2)}
.fileList button.active{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.modalActions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.full{position:fixed;inset:0;background:var(--bg);z-index:25;display:none;flex-direction:column}
.statsHead{height:44px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;background:var(--panel);border-bottom:1px solid var(--line);padding:0 6px}
.statsHead h1{font-size:16px;text-align:center;margin:0}
.tabs{height:38px;display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);border-bottom:1px solid var(--line)}
.tabs button{height:38px;border:0;border-radius:0;background:transparent;font-size:12px}
.tabs button.active{color:#111;background:var(--accent);font-weight:700}
.statsBody{flex:1;overflow:auto;padding:8px;background:var(--bg)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px}
.card h3{font-size:13px;margin:0 0 6px;color:var(--muted)}
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.metric{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px}
.metric span{display:block;font-size:10px;color:var(--muted)}
.metric b{font-size:15px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;background:var(--panel)}
th,td{padding:6px;border-bottom:1px solid var(--line);text-align:right}
th:first-child,td:first-child{text-align:left}
th{position:sticky;top:0;background:var(--panel2);color:var(--muted);z-index:1}
.graphCanvas{width:100%;height:170px;background:var(--chart);border:1px solid var(--line);border-radius:8px;display:block;margin-bottom:8px}
.badge{display:inline-block;padding:2px 6px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--muted)}
@media (min-width:700px){
  .app{max-width:520px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  .full{left:50%;transform:translateX(-50%);max-width:520px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="row row1">
      <div class="segment" id="modeSeg">
        <button data-mode="practice">練習</button>
        <button data-mode="verify">検証</button>
      </div>
      <div class="speedBox">
        <span class="speedLabel" id="speedText">20本/分</span>
        <input id="speedRange" type="range" min="5" max="120" step="1">
        <input id="fastMult" type="number" min="1" max="50" step="1">
      </div>
      <button id="splitBtn" class="smallBtn">1画</button>
      <button id="menuBtn" class="menuBtn">☰</button>
    </div>
    <div class="row row2">
      <div class="sessionBtns">
        <button data-jump="asia">アジア</button>
        <button data-jump="london">ロンドン</button>
        <button data-jump="ny">NY</button>
      </div>
      <div class="tfBtns" id="tfBtns">
        <button data-tf="M1">M1</button>
        <button data-tf="M15">M15</button>
        <button data-tf="H1">H1</button>
      </div>
      <div class="sltpBtns">
        <button id="slBtn">SL</button>
        <button id="tpBtn">TP</button>
      </div>
    </div>
  </div>

  <div class="info" id="infoBar">
    <span>状態 <b id="infoStatus">flat</b></span>
    <span>Entry <b id="infoEntry">-</b></span>
    <span>SL/TP <b id="infoStops">- / -</b></span>
    <span>P/L <b id="infoPnl">-</b></span>
  </div>

  <div class="charts" id="charts">
    <div class="replay" id="replay">
      <button id="backBtn">‹</button>
      <button id="playBtn">▶</button>
      <button id="fwdBtn">›</button>
    </div>
  </div>

  <div class="tradeBtns">
    <button class="sellBtn" id="marketSell">SELL</button>
    <button class="closeBtn" id="closeTrade">CLOSE</button>
    <button class="buyBtn" id="marketBuy">BUY</button>
  </div>
</div>

<div class="lineMenu" id="lineMenu">
  <button data-order="buy_limit">Buy Limit</button>
  <button data-order="sell_limit">Sell Limit</button>
  <button data-order="buy_stop">Buy Stop</button>
  <button data-order="sell_stop">Sell Stop</button>
  <button data-order="delete">削除</button>
</div>

<div class="sheetBg" id="menuBg">
  <div class="sheet">
    <div class="fileName" id="currentFileLabel">ファイル</div>
    <button id="openStats">統計画面</button>
    <button id="openFileManager">ファイル管理</button>
    <button id="openSettings">設定</button>
    <button id="openTradeEdit">SL/TP数値入力</button>
    <button id="cancelPending">注文取消</button>
    <button id="newFile">新規ファイル作成</button>
    <button id="downloadStatsMenu">統計を保存</button>
  </div>
</div>

<div class="modalBg" id="settingsBg">
  <div class="modal">
    <h2>設定</h2>
    <label class="field">現在価格ライン<input id="setCurrentLine" type="checkbox"></label>
    <label class="field">水平線ダブルタップ削除<input id="setDoubleDelete" type="checkbox"></label>
    <div class="modalActions">
      <button id="closeSettings">閉じる</button>
    </div>
  </div>
</div>

<div class="modalBg" id="tradeEditBg">
  <div class="modal">
    <h2>SL / TP</h2>
    <label class="field">SL<input id="slInput" type="number" step="0.01"></label>
    <label class="field">TP<input id="tpInput" type="number" step="0.01"></label>
    <div class="modalActions">
      <button id="clearStops">クリア</button>
      <button id="saveStops">保存</button>
    </div>
  </div>
</div>

<div class="modalBg" id="fileBg">
  <div class="modal">
    <h2>ファイル管理</h2>
    <label class="field">現在<input id="fileNameInput" type="text"></label>
    <div class="modalActions">
      <button id="renameFile">名前変更</button>
      <button id="createFileFromModal">新規作成</button>
    </div>
    <div class="fileList" id="fileList"></div>
    <div class="modalActions">
      <button id="closeFileManager">閉じる</button>
    </div>
  </div>
</div>

<div class="full" id="statsScreen">
  <div class="statsHead">
    <button id="backChart">‹</button>
    <h1>統計</h1>
    <button id="downloadStats">保存</button>
  </div>
  <div class="tabs" id="statTabs">
    <button data-tab="graphs">グラフ</button>
    <button data-tab="summary">集計</button>
    <button data-tab="exit">イグジット最適化</button>
  </div>
  <div class="statsBody" id="statsBody"></div>
</div>

<script>
(function(){
"use strict";

const OLD_KEY="xauusd_phase1_single_html_state_v2";
const STORE_KEY="xauusd_phase1_file_store_v3";
const $=id=>document.getElementById(id);
const fmt=n=>Number.isFinite(n)?Number(n).toFixed(2):"-";
const fmtR=n=>Number.isFinite(n)?Number(n).toFixed(2)+"R":"-";
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const round=n=>Math.round(Number(n)*100)/100;
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
let store=loadStore();
let state=store.files[store.currentId].state;
let data={M1:state.m1,M15:[],H1:[]};
let charts=[];
let playTimer=null;
let playToken=0;
let longPressTimer=null;
let repeatingTimer=null;
let pointer={down:false,startX:0,startY:0,lastX:0,lastY:0,chart:null,drag:null,moved:false,longAdded:false};
let selectedLineId=null;
let sltpMode=null;
let statTab="graphs";

function freshFile(name){
  const m1=generateM1();
  return {
    id:uid(),
    name:name||("XAUUSD "+new Date().toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})),
    state:{
      version:3,
      mode:"practice",
      timeframe:"M1",
      split:false,
      currentIndex:420,
      viewOffset:0,
      barsVisible:58,
      speed:20,
      fastMult:15,
      settings:{currentLine:true,doubleDelete:true},
      m1:m1,
      lines:[],
      position:flatPosition(),
      trades:[]
    }
  };
}
function flatPosition(){
  return {status:"flat",side:null,orderType:null,entry:null,entryIndex:null,entryTime:null,sl:null,tp:null,risk:null,exit:null,exitIndex:null,closeReason:null,resultR:null,lineId:null};
}
function normalizeState(s){
  if(!s||!Array.isArray(s.m1))s=freshFile().state;
  s.version=3;
  s.mode=s.mode==="verify"?"verify":"practice";
  s.timeframe=["M1","M15","H1"].includes(s.timeframe)?s.timeframe:"M1";
  s.split=!!s.split;
  s.currentIndex=clamp(Number(s.currentIndex)||420,10,s.m1.length-1);
  s.viewOffset=clamp(Number(s.viewOffset)||0,0,Math.max(0,s.currentIndex-5));
  s.barsVisible=clamp(Number(s.barsVisible)||58,30,120);
  s.speed=clamp(Number(s.speed)||20,5,120);
  s.fastMult=clamp(Number(s.fastMult)||15,1,50);
  s.settings=Object.assign({currentLine:true,doubleDelete:true},s.settings||{});
  s.lines=Array.isArray(s.lines)?s.lines.filter(l=>Number.isFinite(Number(l.price))).map(l=>({id:l.id||uid(),price:round(l.price)})):[];
  s.trades=Array.isArray(s.trades)?s.trades:[];
  s.position=Object.assign(flatPosition(),s.position||{});
  if(!["flat","pending","open","closed_tp","closed_sl","closed_manual"].includes(s.position.status))s.position=flatPosition();
  return s;
}
function loadStore(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      if(parsed&&parsed.files&&parsed.currentId&&parsed.files[parsed.currentId]){
        Object.keys(parsed.files).forEach(id=>parsed.files[id].state=normalizeState(parsed.files[id].state));
        return parsed;
      }
    }
  }catch(e){}
  try{
    const old=localStorage.getItem(OLD_KEY);
    if(old){
      const oldState=normalizeState(JSON.parse(old));
      const file={id:uid(),name:"Codex版",state:oldState};
      const s={currentId:file.id,files:{}};
      s.files[file.id]=file;
      localStorage.setItem(STORE_KEY,JSON.stringify(s));
      return s;
    }
  }catch(e){}
  const f=freshFile("XAUUSD 01");
  const s={currentId:f.id,files:{}};
  s.files[f.id]=f;
  localStorage.setItem(STORE_KEY,JSON.stringify(s));
  return s;
}
function saveStore(){
  store.files[store.currentId].state=state;
  state.m1=data.M1;
  try{localStorage.setItem(STORE_KEY,JSON.stringify(store));}catch(e){}
}
function switchFile(id){
  if(!store.files[id])return;
  stopPlayIfNeeded(false);
  stopRepeat();
  hideLineMenu();
  sltpMode=null;
  store.currentId=id;
  state=normalizeState(store.files[id].state);
  data={M1:state.m1,M15:resample(state.m1,15),H1:resample(state.m1,60)};
  selectedLineId=null;
  saveStore();
  setupCharts();
  renderFileList();
}
function createNewFile(){
  stopPlayIfNeeded(false);
  const f=freshFile("XAUUSD "+(Object.keys(store.files).length+1));
  store.files[f.id]=f;
  store.currentId=f.id;
  state=f.state;
  data={M1:state.m1,M15:resample(state.m1,15),H1:resample(state.m1,60)};
  selectedLineId=null;
  saveStore();
  setupCharts();
  renderFileList();
}
function currentFile(){return store.files[store.currentId]}
function generateM1(){
  const bars=[];
  const start=new Date();
  start.setSeconds(0,0);
  start.setMinutes(start.getMinutes()-7000);
  let price=2350+Math.random()*80;
  let drift=0;
  for(let i=0;i<7000;i++){
    const t=new Date(start.getTime()+i*60000);
    const h=(t.getUTCHours()+9)%24;
    const asia=h>=7&&h<15;
    const london=h>=15&&h<21;
    const ny=h>=21||h<3;
    let vol=asia?0.55:(london||ny?1.45:0.85);
    if(i%180===0)drift=(Math.random()-.5)*(london||ny?0.18:0.08);
    if(Math.random()<0.012)drift+=(Math.random()-.5)*0.35;
    const open=price;
    let move=(Math.random()-.5)*vol+drift;
    if(Math.random()<0.018)move+=(Math.random()-.5)*(london||ny?8:3);
    const close=Math.max(100,open+move);
    const wickA=Math.random()*vol*1.7;
    const wickB=Math.random()*vol*1.7;
    const high=Math.max(open,close)+wickA;
    const low=Math.min(open,close)-wickB;
    bars.push({t:t.getTime(),o:round(open),h:round(high),l:round(low),c:round(close),i:i});
    price=close;
  }
  return bars;
}
function resample(src,n){
  const out=[];
  if(!Array.isArray(src))return out;
  for(let i=0;i<src.length;i+=n){
    const chunk=src.slice(i,i+n);
    if(!chunk.length)continue;
    out.push({
      t:chunk[0].t,
      o:chunk[0].o,
      h:Math.max.apply(null,chunk.map(b=>b.h)),
      l:Math.min.apply(null,chunk.map(b=>b.l)),
      c:chunk[chunk.length-1].c,
      start:i,
      end:i+chunk.length-1,
      i:out.length
    });
  }
  return out;
}
function syncData(){
  state=normalizeState(state);
  data.M1=state.m1;
  data.M15=resample(data.M1,15);
  data.H1=resample(data.M1,60);
}
function tfFactor(tf){return tf==="M1"?1:tf==="M15"?15:60}
function activeTfs(){
  if(!state.split)return [state.timeframe];
  if(state.timeframe==="H1")return ["M15","H1"];
  return state.timeframe==="M1"?["M1","M15"]:["M15","H1"];
}
function currentBar(){return data.M1[clamp(state.currentIndex,0,data.M1.length-1)]}
function tfCurrentIndex(tf){return clamp(Math.floor(state.currentIndex/tfFactor(tf)),0,Math.max(0,data[tf].length-1))}
function tfVisibleEnd(tf){
  const maxEnd=Math.max(0,data[tf].length-1);
  const end=tfCurrentIndex(tf)-Math.round((Number(state.viewOffset)||0)/tfFactor(tf));
  return clamp(end,0,maxEnd);
}
function getVisibleBars(tf){
  const bars=data[tf]||[];
  if(!bars.length)return {bars:[],start:0,end:0,visible:1,rightPad:4};
  const factor=tfFactor(tf);
  const visible=clamp(Math.round(state.barsVisible/factor*(tf==="M1"?1:1.8)),18,90);
  const rightPad=tf==="M1"?5:4;
  const end=tfVisibleEnd(tf);
  const start=clamp(end-visible+1,0,bars.length-1);
  return {bars,start,end,visible,rightPad};
}
function mapPrice(chart,price){
  if(!Number.isFinite(price)||!Number.isFinite(chart.max)||chart.max===chart.min)return chart.h/2;
  return chart.top+(chart.max-price)/(chart.max-chart.min)*chart.h;
}
function unmapPrice(chart,y){
  if(!Number.isFinite(chart.max)||chart.max===chart.min)return currentBar().c;
  return chart.max-(y-chart.top)/chart.h*(chart.max-chart.min);
}
function setupCharts(){
  syncData();
  const root=$("charts");
  Array.from(root.querySelectorAll(".chartWrap")).forEach(n=>n.remove());
  charts=[];
  const replay=$("replay");
  const tfs=activeTfs();
  tfs.forEach((tf,idx)=>{
    const wrap=document.createElement("div");
    wrap.className="chartWrap"+(tfs.length===1?" single":"");
    wrap.dataset.tf=tf;
    const can=document.createElement("canvas");
    const label=document.createElement("div");
    label.className="chartLabel";
    label.textContent="XAUUSD "+tf;
    wrap.appendChild(can);
    wrap.appendChild(label);
    root.insertBefore(wrap,replay);
    const chart={wrap:wrap,canvas:can,ctx:can.getContext("2d"),tf:tf,idx:idx,axisW:48,left:0,top:0,w:0,h:0,plotW:0,plotH:0,min:0,max:0,start:0,end:0,barW:7,rightPad:4};
    charts.push(chart);
    bindChartEvents(wrap,chart);
  });
  resizeCharts();
}
function resizeCharts(){
  charts.forEach(ch=>{
    const r=ch.wrap.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    ch.canvas.width=Math.max(1,Math.floor(r.width*dpr));
    ch.canvas.height=Math.max(1,Math.floor(r.height*dpr));
    ch.ctx.setTransform(dpr,0,0,dpr,0,0);
    ch.w=r.width;
    ch.h=r.height;
  });
  drawAll();
}
function drawAll(){
  state.currentIndex=clamp(state.currentIndex,10,data.M1.length-1);
  state.viewOffset=clamp(Number(state.viewOffset)||0,0,Math.max(0,state.currentIndex-5));
  applyTheme();
  updateControls();
  charts.forEach(drawChart);
  updateInfo();
  drawStatsIfOpen();
}
function cssVar(name){return getComputedStyle(document.body).getPropertyValue(name).trim()}
function drawChart(ch){
  const ctx=ch.ctx;
  const W=ch.w,H=ch.h,axisW=ch.axisW;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=cssVar("--chart");
  ctx.fillRect(0,0,W,H);
  const g=getVisibleBars(ch.tf);
  ch.start=g.start;ch.end=g.end;ch.rightPad=g.rightPad;
  const allBars=g.bars;
  const bars=allBars.slice(g.start,g.end+1);
  if(!bars.length)return;
  const candleMin=Math.min.apply(null,bars.map(b=>b.l));
  const candleMax=Math.max.apply(null,bars.map(b=>b.h));
  const minRange=ch.tf==="M1"?4.5:(ch.tf==="M15"?12:28);
  const baseRange=Math.max(candleMax-candleMin,minRange);
  let scaleMin=candleMin;
  let scaleMax=candleMax;
  const prices=[];
  state.lines.forEach(l=>prices.push(Number(l.price)));
  const p=state.position;
  if(Number.isFinite(Number(p.entry)))prices.push(Number(p.entry));
  if(Number.isFinite(Number(p.sl)))prices.push(Number(p.sl));
  if(Number.isFinite(Number(p.tp)))prices.push(Number(p.tp));
  if(state.settings.currentLine&&currentBar())prices.push(currentBar().c);
  const nearby=Math.max(baseRange*.75,minRange);
  prices.forEach(v=>{
    if(!Number.isFinite(v))return;
    if(v<scaleMin&&v>=candleMin-nearby)scaleMin=v;
    if(v>scaleMax&&v<=candleMax+nearby)scaleMax=v;
  });
  const scaleRange=Math.max(scaleMax-scaleMin,minRange);
  const center=(scaleMax+scaleMin)/2;
  const pad=scaleRange*.16;
  ch.min=center-scaleRange/2-pad;
  ch.max=center+scaleRange/2+pad;
  ch.left=0;ch.top=0;ch.plotW=Math.max(20,W-axisW);ch.plotH=H;ch.h=H;
  ch.barW=Math.max(3,ch.plotW/Math.max(24,bars.length+ch.rightPad));
  ctx.strokeStyle=cssVar("--grid");
  ctx.lineWidth=1;
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="middle";
  ctx.textAlign="left";
  for(let i=0;i<=5;i++){
    const y=Math.round(i*H/5)+.5;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ch.plotW,y);ctx.stroke();
  }
  drawTimeLabels(ch,bars);
  ctx.fillStyle=cssVar("--panel");
  ctx.fillRect(ch.plotW,0,axisW,H);
  ctx.strokeStyle=cssVar("--line");
  ctx.beginPath();ctx.moveTo(ch.plotW+.5,0);ctx.lineTo(ch.plotW+.5,H);ctx.stroke();
  drawPriceAxis(ch);
  bars.forEach((b,i)=>{
    const x=i*ch.barW+ch.barW*.5;
    const yo=mapPrice(ch,b.o),yc=mapPrice(ch,b.c),yh=mapPrice(ch,b.h),yl=mapPrice(ch,b.l);
    const up=b.c>=b.o;
    ctx.strokeStyle=up?cssVar("--buy"):cssVar("--sell");
    ctx.fillStyle=ctx.strokeStyle;
    ctx.beginPath();ctx.moveTo(x,yh);ctx.lineTo(x,yl);ctx.stroke();
    const bodyY=Math.min(yo,yc),bodyH=Math.max(1,Math.abs(yc-yo));
    ctx.fillRect(x-ch.barW*.32,bodyY,ch.barW*.64,bodyH);
  });
  if(state.settings.currentLine&&currentBar())drawHLine(ch,currentBar().c,"#111",1.25,"",fmt(currentBar().c),true);
  state.lines.forEach(l=>drawHLine(ch,l.price,cssVar("--accent"),1.4,"",fmt(l.price),false,l.id));
  if(p.status==="pending"&&Number.isFinite(Number(p.entry)))drawHLine(ch,p.entry,p.side==="buy"?cssVar("--buy"):cssVar("--sell"),1.6,"注文",fmt(p.entry),false,"entry");
  if(p.status==="open"&&Number.isFinite(Number(p.entry))){
    const col=state.mode==="practice"?"#fff":"#111";
    drawHLine(ch,p.entry,col,1.7,fmt(p.entry),fmtR(unrealizedR()),false,"entry");
  }
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(Number(p.sl)))drawHLine(ch,p.sl,cssVar("--sell"),1.4,"SL",fmt(p.sl),false,"sl");
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(Number(p.tp)))drawHLine(ch,p.tp,cssVar("--buy"),1.4,"TP",fmt(p.tp),false,"tp");
}
function drawPriceAxis(ch){
  const ctx=ch.ctx;
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="middle";
  ctx.textAlign="left";
  ctx.fillStyle=cssVar("--axis");
  const raw=(ch.max-ch.min)/5;
  const step=niceStep(raw);
  const first=Math.ceil(ch.min/step)*step;
  for(let p=first;p<=ch.max+step*.1;p+=step){
    const y=mapPrice(ch,p);
    if(y<8||y>ch.h-8)continue;
    ctx.strokeStyle=cssVar("--grid");
    ctx.beginPath();ctx.moveTo(ch.plotW-4,Math.round(y)+.5);ctx.lineTo(ch.plotW,Math.round(y)+.5);ctx.stroke();
    ctx.fillStyle=cssVar("--axis");
    ctx.fillText(fmt(p),ch.plotW+4,y);
  }
}
function drawTimeLabels(ch,bars){
  const ctx=ch.ctx;
  const count=bars.length;
  const interval=Math.max(6,Math.round(count/4));
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="bottom";
  ctx.textAlign="center";
  ctx.fillStyle=cssVar("--muted");
  ctx.strokeStyle=cssVar("--grid");
  for(let i=0;i<count;i++){
    if(i!==0&&i!==count-1&&i%interval!==0)continue;
    const x=i*ch.barW+ch.barW*.5;
    if(x<18||x>ch.plotW-18)continue;
    ctx.beginPath();ctx.moveTo(x+.5,ch.h-18);ctx.lineTo(x+.5,ch.h);ctx.stroke();
    ctx.fillText(timeLabel(bars[i].t,ch.tf),x,ch.h-3);
  }
}
function niceStep(v){
  const pow=Math.pow(10,Math.floor(Math.log10(Math.max(v,.01))));
  const n=v/pow;
  const m=n<=1?1:n<=2?2:n<=5?5:10;
  return m*pow;
}
function drawHLine(ch,price,color,width,leftText,rightText,solid,id){
  price=Number(price);
  if(!Number.isFinite(price))return;
  const ctx=ch.ctx,y=mapPrice(ch,price);
  if(y<0||y>ch.h)return;
  ctx.save();
  ctx.strokeStyle=color;ctx.lineWidth=width;
  if(!solid)ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(ch.plotW,y+.5);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="middle";
  if(leftText){
    const w=Math.max(24,ctx.measureText(leftText).width+8);
    ctx.fillStyle=color;
    ctx.fillRect(2,clamp(y-10,1,ch.h-20),w,18);
    ctx.fillStyle=color==="#111"?"#fff":"#111";
    ctx.fillText(leftText,6,clamp(y,10,ch.h-10));
  }
  if(rightText){
    const w=Math.max(36,ctx.measureText(rightText).width+8);
    ctx.fillStyle=color;
    ctx.fillRect(ch.plotW-w-2,clamp(y-10,1,ch.h-20),w,18);
    ctx.fillStyle=color==="#111"?"#fff":"#111";
    ctx.fillText(rightText,ch.plotW-w+2,clamp(y,10,ch.h-10));
  }
  ctx.restore();
}
function timeLabel(t,tf){
  const d=new Date(t+9*3600000);
  const h=String(d.getUTCHours()).padStart(2,"0");
  const m=String(d.getUTCMinutes()).padStart(2,"0");
  if(tf==="H1")return String(d.getUTCMonth()+1).padStart(2,"0")+"/"+String(d.getUTCDate()).padStart(2,"0")+" "+h;
  return h+":"+m;
}
function jstFull(t){
  const d=new Date(t+9*3600000);
  return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0")+" "+String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0");
}
function bindChartEvents(el,ch){
  el.addEventListener("pointerdown",e=>{
    hideLineMenu();
    el.setPointerCapture(e.pointerId);
    pointer={down:true,startX:e.clientX,startY:e.clientY,lastX:e.clientX,lastY:e.clientY,chart:ch,drag:null,moved:false,longAdded:false};
    const local=localPoint(ch,e);
    const hit=hitTestLine(ch,local.x,local.y);
    if(hit){
      pointer.drag={type:hit.type,id:hit.id};
      selectedLineId=hit.id||null;
    }else if(local.x>ch.plotW){
      longPressTimer=setTimeout(()=>{
        const price=round(unmapPrice(ch,local.y));
        const line={id:uid(),price:price};
        state.lines.push(line);
        selectedLineId=line.id;
        pointer.longAdded=true;
        saveStore();
        drawAll();
        showLineMenu(line.id,e.clientX-70,e.clientY-10);
      },650);
    }
  });
  el.addEventListener("pointermove",e=>{
    if(!pointer.down||pointer.chart!==ch)return;
    const dx=e.clientX-pointer.lastX;
    if(Math.abs(e.clientX-pointer.startX)>4||Math.abs(e.clientY-pointer.startY)>4)pointer.moved=true;
    if(pointer.moved&&longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
    const local=localPoint(ch,e);
    if(pointer.drag){
      const price=round(unmapPrice(ch,local.y));
      moveTradeOrLine(pointer.drag,price);
      saveStore();
      drawAll();
    }else{
      state.viewOffset=clamp(state.viewOffset+dx/(ch.barW||7)*tfFactor(ch.tf),0,Math.max(0,state.currentIndex-5));
      drawAll();
    }
    pointer.lastX=e.clientX;pointer.lastY=e.clientY;
  });
  el.addEventListener("pointerup",e=>{
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
    if(!pointer.down)return;
    const local=localPoint(ch,e);
    if(!pointer.moved&&!pointer.longAdded){
      const hit=hitTestLine(ch,local.x,local.y);
      if(sltpMode){
        setStopFromTap(round(unmapPrice(ch,local.y)));
      }else if(hit&&hit.type==="analysis"){
        showLineMenu(hit.id,e.clientX-70,e.clientY-8);
      }
    }
    pointer.down=false;pointer.drag=null;
  });
  el.addEventListener("pointercancel",()=>{if(longPressTimer)clearTimeout(longPressTimer);pointer.down=false;pointer.drag=null});
  let lastTap=0,lastId=null;
  el.addEventListener("click",e=>{
    const local=localPoint(ch,e);
    const hit=hitTestLine(ch,local.x,local.y);
    const now=Date.now();
    if(hit&&hit.type==="analysis"&&state.settings.doubleDelete&&lastId===hit.id&&now-lastTap<330){
      state.lines=state.lines.filter(l=>l.id!==hit.id);
      hideLineMenu();
      saveStore();
      drawAll();
    }
    lastTap=now;lastId=hit?hit.id:null;
  });
}
function localPoint(ch,e){
  const r=ch.wrap.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}
function hitTestLine(ch,x,y){
  const p=state.position;
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(Number(p.sl))&&Math.abs(mapPrice(ch,p.sl)-y)<11)return {type:"sl"};
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(Number(p.tp))&&Math.abs(mapPrice(ch,p.tp)-y)<11)return {type:"tp"};
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(Number(p.entry))&&Math.abs(mapPrice(ch,p.entry)-y)<10)return {type:"entry"};
  for(let i=state.lines.length-1;i>=0;i--){
    const l=state.lines[i];
    if(Math.abs(mapPrice(ch,l.price)-y)<10)return {type:"analysis",id:l.id};
  }
  return null;
}
function moveTradeOrLine(drag,price){
  const p=state.position;
  if(drag.type==="analysis"){
    const l=state.lines.find(x=>x.id===drag.id);
    if(l)l.price=price;
  }
  if(drag.type==="sl"&&(p.status==="open"||p.status==="pending"))p.sl=price;
  if(drag.type==="tp"&&(p.status==="open"||p.status==="pending"))p.tp=price;
  if(drag.type==="entry"&&p.status==="pending")p.entry=price;
  if(p.status==="open"&&Number.isFinite(Number(p.entry))&&Number.isFinite(Number(p.sl)))p.risk=Math.abs(p.entry-p.sl)||p.risk;
}
function showLineMenu(id,x,y){
  selectedLineId=id;
  const m=$("lineMenu");
  m.style.display="block";
  m.style.left=clamp(x,6,window.innerWidth-136)+"px";
  m.style.top=clamp(y,48,window.innerHeight-190)+"px";
}
function hideLineMenu(){$("lineMenu").style.display="none"}
function setStopFromTap(price){
  const p=state.position;
  if(p.status!=="open"&&p.status!=="pending"){
    alert("先に注文またはポジションを作成してください");
    sltpMode=null;
    updateControls();
    return;
  }
  if(sltpMode==="sl")p.sl=price;
  if(sltpMode==="tp")p.tp=price;
  if(p.status==="open"&&Number.isFinite(Number(p.entry))&&Number.isFinite(Number(p.sl)))p.risk=Math.abs(p.entry-p.sl)||p.risk;
  sltpMode=null;
  saveStore();
  drawAll();
}
function market(side){
  const p=state.position;
  if(p.status==="open"||p.status==="pending"){
    if(!confirm("現在の注文/ポジションを置き換えますか？"))return;
  }
  const b=currentBar();
  state.position={status:"open",side:side,orderType:"market",entry:b.c,entryIndex:state.currentIndex,entryTime:b.t,sl:null,tp:null,risk:null,exit:null,exitIndex:null,closeReason:null,resultR:null,lineId:null};
  saveStore();
  drawAll();
}
function pendingFromLine(kind){
  const line=state.lines.find(l=>l.id===selectedLineId);
  if(!line)return;
  const p=state.position;
  if(p.status==="open"||p.status==="pending"){
    if(!confirm("現在の注文/ポジションを置き換えますか？"))return;
  }
  const side=kind.indexOf("buy")===0?"buy":"sell";
  state.position={status:"pending",side:side,orderType:kind,entry:line.price,entryIndex:null,entryTime:null,sl:null,tp:null,risk:null,exit:null,exitIndex:null,closeReason:null,resultR:null,lineId:line.id};
  hideLineMenu();
  saveStore();
  drawAll();
}
function cancelPendingOrder(){
  if(state.position.status==="pending"){
    state.position=flatPosition();
    saveStore();
    drawAll();
  }
}
function closeTrade(){
  const p=state.position;
  if(p.status==="open"){
    const b=currentBar();
    closePosition(b.c,"closed_manual",state.currentIndex,b.t);
  }else if(p.status==="pending"){
    state.position=flatPosition();
  }
  saveStore();
  drawAll();
}
function closePosition(price,reason,idx,time){
  const p=state.position;
  if(p.status!=="open")return;
  const risk=Number(p.risk)||Math.abs((Number(p.entry)||price)-(Number(p.sl)||Number(p.entry)))||1;
  const resultR=p.side==="buy"?(price-p.entry)/risk:(p.entry-price)/risk;
  const trade={
    id:uid(),side:p.side,orderType:p.orderType,entryTime:p.entryTime,entryIndex:p.entryIndex,
    entry:p.entry,exitTime:time,exitIndex:idx,exit:round(price),sl:p.sl,tp:p.tp,
    closeReason:reason,resultR:Math.round(resultR*1000)/1000,
    barsHeld:Math.max(0,idx-(p.entryIndex||idx)),mfe:null,mae:null
  };
  enrichTrade(trade);
  state.trades.push(trade);
  state.position=flatPosition();
}
function enrichTrade(t){
  const s=Number(t.entryIndex)||0,e=Number(t.exitIndex)||s;
  const part=data.M1.slice(s,e+1);
  const risk=Math.abs(t.entry-(t.sl||t.entry))||1;
  if(!part.length){t.mfe=0;t.mae=0;return}
  if(t.side==="buy"){
    t.mfe=(Math.max.apply(null,part.map(b=>b.h))-t.entry)/risk;
    t.mae=(Math.min.apply(null,part.map(b=>b.l))-t.entry)/risk;
  }else{
    t.mfe=(t.entry-Math.min.apply(null,part.map(b=>b.l)))/risk;
    t.mae=(t.entry-Math.max.apply(null,part.map(b=>b.h)))/risk;
  }
  t.mfe=Math.round(t.mfe*1000)/1000;
  t.mae=Math.round(t.mae*1000)/1000;
}
function unrealizedR(){
  const p=state.position,b=currentBar();
  if(p.status!=="open"||!Number.isFinite(Number(p.entry))||!b)return NaN;
  const risk=Number(p.risk)||Math.abs(p.entry-(Number(p.sl)||p.entry))||1;
  return p.side==="buy"?(b.c-p.entry)/risk:(p.entry-b.c)/risk;
}
function evaluateBar(){
  const p=state.position,b=currentBar();
  if(!b)return;
  if(p.status==="pending"){
    let hit=false;
    if(p.orderType==="buy_limit"&&b.l<=p.entry)hit=true;
    if(p.orderType==="sell_limit"&&b.h>=p.entry)hit=true;
    if(p.orderType==="buy_stop"&&b.h>=p.entry)hit=true;
    if(p.orderType==="sell_stop"&&b.l<=p.entry)hit=true;
    if(hit){
      p.status="open";
      p.entryIndex=state.currentIndex;
      p.entryTime=b.t;
      p.risk=Number.isFinite(Number(p.sl))?Math.abs(p.entry-p.sl):null;
    }
  }
  if(p.status==="open"){
    if(Number.isFinite(Number(p.sl))&&!Number(p.risk))p.risk=Math.abs(p.entry-p.sl)||1;
    let reason=null,price=null;
    if(p.side==="buy"){
      if(Number.isFinite(Number(p.sl))&&b.l<=p.sl){reason="closed_sl";price=p.sl}
      else if(Number.isFinite(Number(p.tp))&&b.h>=p.tp){reason="closed_tp";price=p.tp}
    }else{
      if(Number.isFinite(Number(p.sl))&&b.h>=p.sl){reason="closed_sl";price=p.sl}
      else if(Number.isFinite(Number(p.tp))&&b.l<=p.tp){reason="closed_tp";price=p.tp}
    }
    if(reason)closePosition(price,reason,state.currentIndex,b.t);
  }
}
function step(dir,count){
  stopPlayIfNeeded(false);
  count=count||1;
  for(let i=0;i<count;i++){
    if(dir<0){
      if(state.mode!=="verify")break;
      state.currentIndex=clamp(state.currentIndex-1,10,data.M1.length-1);
      state.viewOffset=clamp(state.viewOffset,0,Math.max(0,state.currentIndex-5));
    }else{
      if(state.currentIndex>=data.M1.length-1)break;
      state.currentIndex++;
      state.viewOffset=0;
      evaluateBar();
    }
  }
  saveStore();
  drawAll();
}
function playToggle(){
  if(playTimer){stopPlayIfNeeded(true);return}
  playToken++;
  const token=playToken;
  $("playBtn").textContent="Ⅱ";
  let last=performance.now();
  let carry=0;
  const loop=now=>{
    if(token!==playToken)return;
    const speed=clamp(Number(state.speed)||20,5,120);
    const interval=60000/speed;
    carry+=now-last;
    last=now;
    let moved=0;
    while(carry>=interval&&moved<8){
      carry-=interval;
      moved++;
      if(state.currentIndex>=data.M1.length-1){stopPlayIfNeeded(true);return}
      state.currentIndex++;
      state.viewOffset=0;
      evaluateBar();
    }
    if(moved){saveStore();drawAll()}
    playTimer=requestAnimationFrame(loop);
  };
  playTimer=requestAnimationFrame(loop);
}
function stopPlayIfNeeded(redraw){
  if(playTimer){
    cancelAnimationFrame(playTimer);
    playTimer=null;
    playToken++;
    $("playBtn").textContent="▶";
    if(redraw)drawAll();
  }
}
function startRepeat(dir){
  if(repeatingTimer)return;
  const run=()=>{
    const mult=clamp(Number(state.fastMult)||10,1,50);
    const per=Math.max(1,Math.round(mult/4));
    if(dir<0&&state.mode!=="verify"){stopRepeat();return}
    if(dir>0&&state.currentIndex>=data.M1.length-1){stopRepeat();return}
    for(let i=0;i<per;i++){
      if(dir<0)state.currentIndex=clamp(state.currentIndex-1,10,data.M1.length-1);
      else{state.currentIndex++;evaluateBar()}
      if(state.currentIndex<=10||state.currentIndex>=data.M1.length-1)break;
    }
    state.viewOffset=0;
    saveStore();
    drawAll();
    repeatingTimer=setTimeout(run,70);
  };
  run();
}
function stopRepeat(){

function jumpSession(kind){
  const hours={asia:8,london:16,ny:22};
  const target=hours[kind];
  for(let i=state.currentIndex;i<data.M1.length;i++){
    const d=new Date(data.M1[i].t+9*3600000);
    if(d.getUTCHours()===target&&d.getUTCMinutes()===0){
      state.currentIndex=i;
      state.viewOffset=0;
      break;
    }
  }
  saveStore();
  drawAll();
}
function stats(trades){
  trades=Array.isArray(trades)?trades:[];
  const n=trades.length;
  const wins=trades.filter(t=>Number(t.resultR)>0);
  const losses=trades.filter(t=>Number(t.resultR)<0);
  const sum=trades.reduce((a,t)=>a+(Number(t.resultR)||0),0);
  const gp=wins.reduce((a,t)=>a+Number(t.resultR),0);
  const gl=Math.abs(losses.reduce((a,t)=>a+Number(t.resultR),0));
  let maxW=0,maxL=0,cw=0,cl=0;
  trades.forEach(t=>{
    const r=Number(t.resultR)||0;
    if(r>0){cw++;cl=0}else if(r<0){cl++;cw=0}else{cw=0;cl=0}
    maxW=Math.max(maxW,cw);maxL=Math.max(maxL,cl);
  });
  const avgWin=wins.length?gp/wins.length:0;
  const avgLoss=losses.length?gl/losses.length:0;
  const winP=n?wins.length/n:0;
  const lossP=n?losses.length/n:0;
  const rrr=lossP&&avgLoss?(winP*avgWin)/(lossP*avgLoss):(winP&&avgWin?Infinity:0);
  return {n:n,winRate:n?winP*100:0,lossRate:n?lossP*100:0,avgR:n?sum/n:0,pf:gl?gp/gl:(gp?Infinity:0),expectancy:n?sum/n:0,maxW:maxW,maxL:maxL,avgWin:avgWin,avgLoss:avgLoss,rr:avgLoss?avgWin/avgLoss:0,rrr:rrr,sum:sum};
}
function hourlyStats(stepMin){
  const map={};
  state.trades.forEach(t=>{
    if(!Number.isFinite(Number(t.entryTime)))return;
    const d=new Date(t.entryTime+9*3600000);
    const h=d.getUTCHours(),m=d.getUTCMinutes();
    const key=stepMin===60?String(h).padStart(2,"0")+":00":String(h).padStart(2,"0")+":"+String(Math.floor(m/10)*10).padStart(2,"0");
    (map[key]||(map[key]=[])).push(t);
  });
  return Object.keys(map).sort().map(k=>Object.assign({key:k},stats(map[k])));
}

function renderGraphTab(body){

function renderSummaryTab(body){
  const s=stats(state.trades);
  const hourly=hourlyStats(60);
  const ten=hourlyStats(10);
  body.innerHTML=
    '<div class="card"><h3>集計</h3><div class="statGrid">'+
    metric("総トレード数",s.n)+metric("勝率",s.winRate.toFixed(1)+"%")+metric("平均R",s.avgR.toFixed(2))+metric("Profit Factor",s.pf===Infinity?"∞":s.pf.toFixed(2))+
    metric("Expectancy",s.expectancy.toFixed(2))+metric("最大連勝",s.maxW)+metric("最大連敗",s.maxL)+metric("RRR",s.rrr===Infinity?"∞":s.rrr.toFixed(2))+
    '</div></div>'+
    '<div class="card"><h3>時間帯統計 JST 1時間</h3>'+simpleTable(["時間","数","勝率","PF"],hourly.map(x=>[x.key,x.n,x.winRate.toFixed(0)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2)]))+'</div>'+
    '<div class="card"><h3>詳細モード JST 10分</h3>'+simpleTable(["時間","数","勝率","PF"],ten.map(x=>[x.key,x.n,x.winRate.toFixed(0)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2)]))+'</div>'+
    '<div class="card"><h3>トレード一覧</h3>'+tradeTable(state.trades)+'</div>';
}
function metric(k,v){return '<div class="metric"><span>'+esc(k)+'</span><b>'+esc(String(v))+'</b></div>'}
function simpleTable(head,rows){
  return '<div class="tableWrap"><table><thead><tr>'+head.map(h=>'<th>'+esc(h)+'</th>').join("")+'</tr></thead><tbody>'+
    (rows.length?rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(String(c))+'</td>').join("")+'</tr>').join(""):'<tr><td colspan="'+head.length+'">データなし</td></tr>')+
    '</tbody></table></div>';
}
function tradeTable(trades){
  const rows=trades.slice().reverse().map(t=>[
    jstFull(t.entryTime),fmt(t.entry),fmt(t.exit),Number.isFinite(Number(t.sl))?fmt(t.sl):"-",Number.isFinite(Number(t.tp))?fmt(t.tp):"-",t.closeReason,fmtR(t.resultR)
  ]);
  return simpleTable(["エントリー日時","Entry","Exit","SL","TP","closeReason","resultR"],rows);
}
function renderExitTab(body){
  const nRows=[],rrRows=[];
  for(let n=1;n<=20;n++){
    const rs=state.trades.map(t=>simulateNExit(t,n)).filter(Number.isFinite);
    const s=stats(rs.map(r=>({resultR:r})));
    nRows.push(Object.assign({rule:n},s));
  }
  for(let rr=1;rr<=5.0001;rr+=.5){
    const rs=state.trades.map(t=>simulateRR(t,rr)).filter(Number.isFinite);
    const s=stats(rs.map(r=>({resultR:r})));
    rrRows.push(Object.assign({rule:rr.toFixed(1)},s));
  }
  const bestN=nRows.reduce((a,b)=>b.expectancy>a.expectancy?b:a,{expectancy:-Infinity,rule:"-"});
  const bestRR=rrRows.reduce((a,b)=>b.expectancy>a.expectancy?b:a,{expectancy:-Infinity,rule:"-"});
  body.innerHTML=
    '<div class="card"><h3>簡易グラフ</h3><canvas class="graphCanvas" id="exitGraph"></canvas><span class="badge">最適N '+esc(String(bestN.rule))+'</span> <span class="badge">最適倍率 '+esc(String(bestRR.rule))+'</span></div>'+
    '<div class="card"><h3>N本後決済ルール</h3>'+simpleTable(["N","勝率","PF","Expectancy"],nRows.map(x=>[x.rule,x.winRate.toFixed(1)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2),x.expectancy.toFixed(2)]))+'</div>'+
    '<div class="card"><h3>固定TP倍率ルール</h3>'+simpleTable(["倍率","勝率","PF","Expectancy"],rrRows.map(x=>[x.rule,x.winRate.toFixed(1)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2),x.expectancy.toFixed(2)]))+'</div>';
  setTimeout(()=>drawExitGraph(nRows),0);
}
function simulateNExit(t,n){
  if(!Number.isFinite(Number(t.entryIndex)))return NaN;
  const idx=clamp(Number(t.entryIndex)+n,0,data.M1.length-1);
  const exit=data.M1[idx].c;
  const risk=Math.abs(t.entry-(t.sl||t.entry))||1;
  return t.side==="buy"?(exit-t.entry)/risk:(t.entry-exit)/risk;
}
function simulateRR(t,rr){
  if(!Number.isFinite(Number(t.entryIndex)))return NaN;
  const risk=Math.abs(t.entry-(t.sl||t.entry))||1;
  const target=t.side==="buy"?t.entry+risk*rr:t.entry-risk*rr;
  const stop=t.sl;
  const end=clamp(Number(t.entryIndex)+60,0,data.M1.length-1);
  for(let i=Number(t.entryIndex);i<=end;i++){
    const b=data.M1[i];
    if(t.side==="buy"){
      if(Number.isFinite(Number(stop))&&b.l<=stop)return -1;
      if(b.h>=target)return rr;
    }else{
      if(Number.isFinite(Number(stop))&&b.h>=stop)return -1;
      if(b.l<=target)return rr;
    }
  }
  const exit=data.M1[end].c;
  return t.side==="buy"?(exit-t.entry)/risk:(t.entry-exit)/risk;
}
function drawStatsIfOpen(){
  if($("statsScreen").style.display!=="flex")return;

    drawEquity($("eqGraph"));

function prepCanvas(c){
  if(!c)return null;
  const r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;
  c.width=Math.floor(r.width*d);c.height=Math.floor(r.height*d);
  const ctx=c.getContext("2d");
  ctx.setTransform(d,0,0,d,0,0);
  return {ctx:ctx,w:r.width,h:r.height};
}
function baseGraph(c){
  const p=prepCanvas(c);if(!p)return null;
  const ctx=p.ctx,w=p.w,h=p.h;
  ctx.fillStyle=cssVar("--chart");ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=cssVar("--grid");ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=18+(h-34)*i/4;ctx.beginPath();ctx.moveTo(28,y);ctx.lineTo(w-10,y);ctx.stroke()}
  ctx.font="10px sans-serif";ctx.fillStyle=cssVar("--muted");
  return p;
}
function drawEquity(c){
  const p=baseGraph(c);if(!p)return;
  const ctx=p.ctx,w=p.w,h=p.h,vals=[0];
  state.trades.forEach(t=>vals.push(vals[vals.length-1]+(Number(t.resultR)||0)));
  const min=Math.min.apply(null,vals.concat([0])),max=Math.max.apply(null,vals.concat([1])),range=max-min||1;
  ctx.strokeStyle=cssVar("--accent");ctx.lineWidth=2;ctx.beginPath();
  vals.forEach((v,i)=>{const x=28+(w-40)*(i/Math.max(1,vals.length-1));const y=14+(h-32)*(1-(v-min)/range);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();ctx.fillStyle=cssVar("--muted");ctx.fillText("累積 "+fmtR(vals[vals.length-1]),32,16);
}
function drawHour(c){
  const p=baseGraph(c);if(!p)return;
  const ctx=p.ctx,w=p.w,h=p.h,hs=hourlyStats(60);
  const vals=Array.from({length:24},(_,i)=>{const x=hs.find(a=>parseInt(a.key,10)===i);return x?x.avgR:0});
  const max=Math.max.apply(null,[1].concat(vals.map(Math.abs)));
  const zero=18+(h-34)/2,bw=(w-42)/24;
  vals.forEach((v,i)=>{
    const bh=(h-38)/2*Math.abs(v)/max;
    ctx.fillStyle=v>=0?cssVar("--buy"):cssVar("--sell");
    ctx.fillRect(30+i*bw,v>=0?zero-bh:zero,Math.max(2,bw-2),bh);
  });
  ctx.strokeStyle=cssVar("--axis");ctx.beginPath();ctx.moveTo(28,zero);ctx.lineTo(w-10,zero);ctx.stroke();
}
function drawHist(c){
  const p=baseGraph(c);if(!p)return;
  const ctx=p.ctx,w=p.w,h=p.h,bins=[-3,-2,-1,0,1,2,3,4,5],cnt=Array(bins.length-1).fill(0);
  state.trades.forEach(t=>{let r=Number(t.resultR)||0;for(let i=0;i<bins.length-1;i++){if(r>=bins[i]&&r<bins[i+1]){cnt[i]++;break}}});
  const max=Math.max.apply(null,[1].concat(cnt)),bw=(w-42)/cnt.length;
  cnt.forEach((v,i)=>{const bh=(h-38)*v/max;ctx.fillStyle=i<3?cssVar("--sell"):cssVar("--buy");ctx.fillRect(30+i*bw,h-18-bh,Math.max(3,bw-3),bh)});
}
function drawExitGraph(nRows){
  const c=$("exitGraph"),p=baseGraph(c);if(!p)return;
  const ctx=p.ctx,w=p.w,h=p.h,vals=nRows.map(x=>x.expectancy);
  const min=Math.min.apply(null,[-1].concat(vals)),max=Math.max.apply(null,[1].concat(vals)),range=max-min||1;
  ctx.strokeStyle=cssVar("--accent");ctx.lineWidth=2;ctx.beginPath();
  vals.forEach((v,i)=>{const x=30+(w-42)*(i/Math.max(1,vals.length-1));const y=14+(h-32)*(1-(v-min)/range);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();
  ctx.fillStyle=cssVar("--muted");ctx.fillText("N本後 Expectancy",32,16);
}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function downloadStats(){
  const payload={exportedAt:new Date().toISOString(),file:currentFile().name,mode:state.mode,stats:stats(state.trades),hourly:hourlyStats(60),trades:state.trades};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});

  a.href=URL.createObjectURL(blob);
  a.download="xauusd_stats_"+currentFile().name.replace(/[\\/:*?"<>|]/g,"_")+"_"+Date.now()+".json";
  document.body.appendChild(a);a.click();a.remove();

function bindHold(btn,dir){
  let held=false,timer=null;
  btn.addEventListener("pointerdown",e=>{
    btn.setPointerCapture(e.pointerId);
    held=false;
    timer=setTimeout(()=>{held=true;stopPlayIfNeeded(false);startRepeat(dir)},360);
  });
  btn.addEventListener("pointerup",()=>{
    if(timer)clearTimeout(timer);
    stopRepeat();
    if(!held)step(dir,1);
  });
  btn.addEventListener("pointercancel",()=>{if(timer)clearTimeout(timer);stopRepeat()});
}
