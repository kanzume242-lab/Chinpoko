<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>XAUUSD Practice</title>
<style>
:root{
  --bg:#0d1117;
  --panel:#141a22;
  --panel2:#1b2330;
  --panel3:#202a38;
  --text:#e7edf5;
  --muted:#8d98a8;
  --line:#303949;
  --grid:#202938;
  --chart:#0a0f16;
  --axis:#b9c0cc;
  --accent:#d6a94a;
  --buy:#1fa774;
  --sell:#d54f58;
  --shadow:rgba(0,0,0,.24);
}
body.verify{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --panel2:#eef1f5;
  --panel3:#e7ebf1;
  --text:#1a1d22;
  --muted:#687282;
  --line:#d8dde5;
  --grid:#e5e9f0;
  --chart:#fbfcfe;
  --axis:#323842;
  --accent:#b8871c;
  --buy:#138d63;
  --sell:#c63d47;
  --shadow:rgba(0,0,0,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select{font:inherit;color:inherit}
button{border:1px solid var(--line);background:var(--panel3);border-radius:7px;height:30px;padding:0 8px;cursor:pointer}
button:active{transform:translateY(1px)}
.app{height:100%;display:flex;flex-direction:column;background:var(--bg)}
.topbar{flex:0 0 auto;padding:5px 6px 3px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 4px var(--shadow);z-index:5}
.row{display:grid;gap:4px;align-items:center;margin-bottom:4px}
.row1{grid-template-columns:auto minmax(0,1fr) auto auto}
.row2{grid-template-columns:minmax(0,.98fr) minmax(0,.76fr) auto}
.segment{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;height:30px;background:var(--panel2)}
.segment button{height:28px;border:0;border-radius:0;background:transparent;padding:0 7px;font-size:12px;white-space:nowrap}
.segment button.active{background:var(--accent);color:#111;font-weight:800}
.speedBox{display:grid;grid-template-columns:42px minmax(60px,1fr) 42px;gap:4px;align-items:center;height:30px}
.speedLabel{height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;background:var(--panel2);font-size:11px;color:var(--text)}
.speedBox input[type=range]{width:100%;height:22px;accent-color:var(--accent)}
.speedBox input[type=number]{width:42px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel2);text-align:center;font-size:12px;padding:0}
.smallBtn{min-width:34px;font-size:12px}
.menuBtn{width:34px;font-size:18px;line-height:1}
.sessionBtns,.tfBtns,.sltpBtns{display:flex;gap:4px;min-width:0}
.sessionBtns button,.tfBtns button,.sltpBtns button{font-size:11px;padding:0 6px;min-width:0;flex:1}
.sltpBtns button{flex:0 0 auto;width:34px}
button.hot{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.info{height:25px;display:grid;grid-template-columns:1.05fr 1fr 1.28fr 1fr;gap:4px;align-items:center;padding:0 7px;border-bottom:1px solid var(--line);background:var(--panel2);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden}
.info b{color:var(--text);font-weight:600}
.charts{flex:1 1 auto;min-height:0;background:var(--chart);display:flex;flex-direction:column;gap:1px;touch-action:none;position:relative}
.chartWrap{position:relative;flex:1 1 0;min-height:0;background:var(--chart);overflow:hidden}
.chartWrap.single{flex:1 1 auto}
.chartWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.chartLabel{position:absolute;left:6px;top:5px;font-size:11px;color:var(--muted);background:color-mix(in srgb,var(--chart) 80%,transparent);padding:2px 5px;border-radius:5px;pointer-events:none}
.lineMenu{position:fixed;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 22px var(--shadow);padding:4px;display:none}
.lineMenu button{display:block;width:124px;text-align:left;margin:2px 0;font-size:12px;height:30px}
.tradeBtns{height:58px;display:grid;grid-template-columns:1fr .9fr 1fr;gap:6px;padding:5px 7px calc(5px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line);z-index:6}
.tradeBtns button{height:48px;border-radius:8px;font-size:16px;font-weight:800;letter-spacing:0}
.sellBtn{background:linear-gradient(180deg,#df646c,var(--sell));color:#fff;border-color:#b73740}
.buyBtn{background:linear-gradient(180deg,#2ebb88,var(--buy));color:#fff;border-color:#137b58}
.closeBtn{background:var(--panel2);border-color:var(--accent);color:var(--text)}
.replay{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);display:flex;gap:7px;z-index:4;background:color-mix(in srgb,var(--panel) 88%,transparent);padding:4px;border:1px solid var(--line);border-radius:9px;box-shadow:0 4px 12px var(--shadow)}
.replay button{width:46px;height:36px;font-weight:900;font-size:15px}
.sheetBg,.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:30;display:none}
.sheet{position:absolute;right:8px;top:48px;width:min(286px,calc(100vw - 16px));background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px var(--shadow);padding:7px}
.sheet button{width:100%;height:36px;text-align:left;margin:3px 0;background:var(--panel2)}
.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(360px,calc(100vw - 26px));max-height:86vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 14px 32px var(--shadow);padding:12px}
.modal h2{font-size:16px;margin:0 0 10px}
.field{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.field input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
.field input[type=number],.field input[type=text],.field select{width:150px;height:32px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);padding:0 8px}
.fileList{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:8px}
.fileRow{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;padding:7px;border-bottom:1px solid var(--line);background:var(--panel2);font-size:12px}
.fileRow:last-child{border-bottom:0}
.fileRow b{font-size:13px}
.fileRow span{display:block;color:var(--muted);font-size:10px}
.fileRow button{height:28px;font-size:11px}
.modalActions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.full{position:fixed;inset:0;background:var(--bg);z-index:25;display:none;flex-direction:column}
.statsHead{height:44px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;background:var(--panel);border-bottom:1px solid var(--line);padding:0 6px}
.statsHead h1{font-size:16px;text-align:center;margin:0}
.tabs{height:38px;display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);border-bottom:1px solid var(--line)}
.tabs button{height:38px;border:0;border-radius:0;background:transparent;font-size:12px}
.tabs button.active{color:#111;background:var(--accent);font-weight:800}
.statsBody{flex:1;overflow:auto;padding:8px;background:var(--bg)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px}
.card h3{font-size:13px;margin:0 0 6px;color:var(--muted)}
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.metric{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px}
.metric span{display:block;font-size:10px;color:var(--muted)}
.metric b{font-size:15px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;background:var(--panel)}
th,td{padding:6px;border-bottom:1px solid var(--line);text-align:right}
th:first-child,td:first-child{text-align:left}
th{position:sticky;top:0;background:var(--panel2);color:var(--muted);z-index:1}
.graphCanvas{width:100%;height:170px;background:var(--chart);border:1px solid var(--line);border-radius:8px;display:block;margin-bottom:8px}
.badge{display:inline-block;padding:2px 6px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--muted)}
@media (min-width:700px){
  .app{max-width:520px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  .full{left:50%;transform:translateX(-50%);max-width:520px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="row row1">
      <div class="segment" id="modeSeg">
        <button data-mode="practice">練習</button>
        <button data-mode="verify">検証</button>
      </div>
      <div class="speedBox">
        <div class="speedLabel" id="speedLabel">20/m</div>
        <input id="speedRange" type="range" min="1" max="80" step="1">
        <input id="fastMult" type="number" min="1" max="50" step="1">
      </div>
      <button id="splitBtn" class="smallBtn">1画</button>
      <button id="menuBtn" class="menuBtn">☰</button>
    </div>
    <div class="row row2">
      <div class="sessionBtns">
        <button data-jump="asia">アジア</button>
        <button data-jump="london">ロンドン</button>
        <button data-jump="ny">NY</button>
      </div>
      <div class="tfBtns" id="tfBtns">
        <button data-tf="M1">M1</button>
        <button data-tf="M15">M15</button>
        <button data-tf="H1">H1</button>
      </div>
      <div class="sltpBtns">
        <button id="slBtn">SL</button>
        <button id="tpBtn">TP</button>
      </div>
    </div>
  </div>

  <div class="info" id="infoBar">
    <span>状態 <b id="infoStatus">flat</b></span>
    <span>Entry <b id="infoEntry">-</b></span>
    <span>SL/TP <b id="infoStops">- / -</b></span>
    <span>P/L <b id="infoPnl">-</b></span>
  </div>

  <div class="charts" id="charts">
    <div class="replay" id="replay">
      <button id="backBtn">‹</button>
      <button id="playBtn">▶</button>
      <button id="fwdBtn">›</button>
    </div>
  </div>

  <div class="tradeBtns">
    <button class="sellBtn" id="marketSell">SELL</button>
    <button class="closeBtn" id="closeTrade">CLOSE</button>
    <button class="buyBtn" id="marketBuy">BUY</button>
  </div>
</div>

<div class="lineMenu" id="lineMenu">
  <button data-order="buy_limit">Buy Limit</button>
  <button data-order="sell_limit">Sell Limit</button>
  <button data-order="buy_stop">Buy Stop</button>
  <button data-order="sell_stop">Sell Stop</button>
  <button data-order="delete">削除</button>
</div>

<div class="sheetBg" id="menuBg">
  <div class="sheet">
    <button id="openStats">統計画面</button>
    <button id="openFiles">ファイル管理</button>
    <button id="openSettings">設定</button>
    <button id="openTradeEdit">SL/TP数値入力</button>
    <button id="downloadStatsMenu">統計を保存</button>
  </div>
</div>

<div class="modalBg" id="settingsBg">
  <div class="modal">
    <h2>設定</h2>
    <label class="field">現在価格ライン<input id="setCurrentLine" type="checkbox"></label>
    <label class="field">水平線ダブルタップ削除<input id="setDoubleDelete" type="checkbox"></label>
    <div class="modalActions">
      <button id="closeSettings">閉じる</button>
    </div>
  </div>
</div>

<div class="modalBg" id="fileBg">
  <div class="modal">
    <h2>ファイル管理</h2>
    <label class="field">新規名<input id="newFileName" type="text" maxlength="28"></label>
    <div class="modalActions">
      <button id="createFile">新規作成</button>
    </div>
    <div class="fileList" id="fileList"></div>
    <div class="modalActions">
      <button id="closeFiles">閉じる</button>
    </div>
  </div>
</div>

<div class="modalBg" id="tradeEditBg">
  <div class="modal">
    <h2>SL / TP</h2>
    <label class="field">SL<input id="slInput" type="number" step="0.01"></label>
    <label class="field">TP<input id="tpInput" type="number" step="0.01"></label>
    <div class="modalActions">
      <button id="clearStops">クリア</button>
      <button id="saveStops">保存</button>
    </div>
  </div>
</div>

<div class="full" id="statsScreen">
  <div class="statsHead">
    <button id="backChart">‹</button>
    <h1>統計</h1>
    <button id="downloadStats">保存</button>
  </div>
  <div class="tabs" id="statTabs">
    <button data-tab="graphs">グラフ</button>
    <button data-tab="summary">集計</button>
    <button data-tab="exit">イグジット最適化</button>
  </div>
  <div class="statsBody" id="statsBody"></div>
</div>

<script>
(function(){
"use strict";

const APP_KEY="xauusd_phase1_files_v4";
const FILE_PREFIX="xauusd_phase1_file_v4_";
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const round=n=>Math.round(n*100)/100;
const fmt=n=>Number.isFinite(Number(n))?Number(n).toFixed(2):"-";
const fmtR=n=>Number.isFinite(Number(n))?Number(n).toFixed(2)+"R":"-";
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);

let registry=loadRegistry();
let state=loadCurrentFile();
let data=makeDataCache(state.m1);
let charts=[];
let playTimer=null;
let playToken=0;
let repeatTimer=null;
let holdTimer=null;
let pointer={down:false,startX:0,startY:0,lastX:0,lastY:0,chart:null,drag:null,moved:false,longAdded:false,axisStart:false};
let selectedLineId=null;
let sltpMode=null;
let statTab="graphs";

function defaultRegistry(){
  const id=uid();
  return {currentId:id,files:[{id,name:"File 1",updatedAt:Date.now()}]};
}

function loadRegistry(){
  try{
    const r=JSON.parse(localStorage.getItem(APP_KEY));
    if(r&&r.currentId&&Array.isArray(r.files)&&r.files.length)return r;
  }catch(e){}
  const r=defaultRegistry();
  localStorage.setItem(APP_KEY,JSON.stringify(r));
  const s=freshFileState(r.files[0].name);
  saveFile(r.currentId,s);
  return r;
}

function saveRegistry(){
  localStorage.setItem(APP_KEY,JSON.stringify(registry));
}

function freshFileState(name){
  const m1=generateM1();
  return {
    version:4,
    name:name||"File",
    mode:"practice",
    timeframe:"M1",
    split:false,
    currentIndex:420,
    viewOffset:0,
    barsVisible:58,
    speed:20,
    fastMult:15,
    settings:{currentLine:true,doubleDelete:true},
    m1,
    lines:[],
    position:flatPosition(),
    trades:[]
  };
}

function flatPosition(){
  return {status:"flat",side:null,orderType:null,entry:null,entryIndex:null,entryTime:null,sl:null,tp:null,risk:null,exit:null,exitIndex:null,closeTime:null,closeReason:null,resultR:null,lineId:null};
}

function normalizeFile(s){
  if(!s||!Array.isArray(s.m1))return freshFileState("File");
  s.settings=Object.assign({currentLine:true,doubleDelete:true},s.settings||{});
  s.lines=Array.isArray(s.lines)?s.lines:[];
  s.trades=Array.isArray(s.trades)?s.trades:[];
  s.trades.forEach(t=>{if(t.exitTime&&!t.closeTime)t.closeTime=t.exitTime});
  s.position=Object.assign(flatPosition(),s.position||{});
  if(!["flat","pending","open"].includes(s.position.status))s.position=flatPosition();
  s.speed=clamp(Number(s.speed)||20,1,80);
  s.fastMult=clamp(Number(s.fastMult)||15,1,50);
  s.barsVisible=clamp(Number(s.barsVisible)||58,30,120);
  s.currentIndex=clamp(Number(s.currentIndex)||300,10,s.m1.length-1);
  s.viewOffset=clamp(Number(s.viewOffset)||0,0,Math.max(0,s.currentIndex-5));
  if(!["M1","M15","H1"].includes(s.timeframe))s.timeframe="M1";
  s.split=!!s.split;
  s.name=s.name||"File";
  return s;
}

function loadCurrentFile(){
  let id=registry.currentId;
  if(!registry.files.some(f=>f.id===id)){
    registry.currentId=registry.files[0].id;
    saveRegistry();
    id=registry.currentId;
  }
  try{
    const s=normalizeFile(JSON.parse(localStorage.getItem(FILE_PREFIX+id)));
    saveFile(id,s);
    return s;
  }catch(e){
    const file=registry.files.find(f=>f.id===id)||registry.files[0];
    const s=freshFileState(file.name);
    saveFile(id,s);
    return s;
  }
}

function saveFile(id=registry.currentId,s=state){
  s.m1=data&&data.M1?data.M1:s.m1;
  localStorage.setItem(FILE_PREFIX+id,JSON.stringify(s));
  const f=registry.files.find(x=>x.id===id);
  if(f){f.name=s.name||f.name;f.updatedAt=Date.now()}
  saveRegistry();
}

function switchFile(id){
  if(id===registry.currentId)return;
  stopPlay(false);
  stopRepeat();
  saveFile();
  registry.currentId=id;
  saveRegistry();
  state=loadCurrentFile();
  data=makeDataCache(state.m1);
  selectedLineId=null;
  sltpMode=null;
  $("fileBg").style.display="none";
  setupCharts();
}

function createNewFile(){
  stopPlay(false);
  stopRepeat();
  saveFile();
  const name=($("newFileName").value||"File "+(registry.files.length+1)).trim().slice(0,28);
  const id=uid();
  registry.files.push({id,name,updatedAt:Date.now()});
  registry.currentId=id;
  state=freshFileState(name);
  data=makeDataCache(state.m1);
  saveFile(id,state);
  saveRegistry();
  $("newFileName").value="";
  selectedLineId=null;
  sltpMode=null;
  renderFileList();
  setupCharts();
}

function makeDataCache(m1){
  return {M1:m1,M15:resample(m1,15),H1:resample(m1,60)};
}

function generateM1(){
  const bars=[];
  const start=new Date();
  start.setSeconds(0,0);
  start.setMinutes(start.getMinutes()-7000);
  let price=2350+Math.random()*80;
  let drift=0;
  for(let i=0;i<7000;i++){
    const t=new Date(start.getTime()+i*60000);
    const h=(t.getUTCHours()+9)%24;
    const asia=h>=7&&h<15;
    const london=h>=15&&h<21;
    const ny=h>=21||h<3;
    const vol=asia?0.55:(london||ny?1.45:0.85);
    if(i%180===0)drift=(Math.random()-.5)*(london||ny?0.18:0.08);
    if(Math.random()<0.012)drift+=(Math.random()-.5)*0.35;
    const open=price;
    let move=(Math.random()-.5)*vol+drift;
    if(Math.random()<0.018)move+=(Math.random()-.5)*(london||ny?8:3);
    const close=Math.max(100,open+move);
    const wickA=Math.random()*vol*1.7;
    const wickB=Math.random()*vol*1.7;
    const high=Math.max(open,close)+wickA;
    const low=Math.min(open,close)-wickB;
    bars.push({t:t.getTime(),o:round(open),h:round(high),l:round(low),c:round(close),i});
    price=close;
  }
  return bars;
}

function resample(src,n){
  const out=[];
  for(let i=0;i<src.length;i+=n){
    const chunk=src.slice(i,i+n);
    if(!chunk.length)continue;
    out.push({t:chunk[0].t,o:chunk[0].o,h:Math.max(...chunk.map(b=>b.h)),l:Math.min(...chunk.map(b=>b.l)),c:chunk[chunk.length-1].c,start:i,end:i+chunk.length-1,i:out.length});
  }
  return out;
}

function tfFactor(tf){return tf==="M1"?1:tf==="M15"?15:60}
function currentBar(){return data.M1[clamp(state.currentIndex,0,data.M1.length-1)]}
function activeTfs(){
  if(!state.split)return [state.timeframe];
  return state.timeframe==="M1"?["M1","M15"]:["M15","H1"];
}
function tfCurrentIndex(tf){return clamp(Math.floor(state.currentIndex/tfFactor(tf)),0,data[tf].length-1)}
function tfEndIndex(tf){return clamp(tfCurrentIndex(tf)-Math.round(state.viewOffset/tfFactor(tf)),0,data[tf].length-1)}
function visible(tf){
  const factor=tfFactor(tf);
  const desired=tf==="M1"?state.barsVisible:Math.round(state.barsVisible*1.55);
  const count=clamp(Math.round(desired/factor),18,90);
  const rightPad=5;
  const end=tfEndIndex(tf);
  const start=clamp(end-count+1,0,data[tf].length-1);
  return {start,end,count,rightPad,bars:data[tf]};
}

function cssVar(n){return getComputedStyle(document.body).getPropertyValue(n).trim()}
function applyTheme(){document.body.classList.toggle("verify",state.mode==="verify")}

function setupCharts(){
  const root=$("charts");
  const replay=$("replay");
  root.innerHTML="";
  charts=[];
  activeTfs().forEach(tf=>{
    const wrap=document.createElement("div");
    wrap.className="chartWrap"+(activeTfs().length===1?" single":"");
    const canvas=document.createElement("canvas");
    const label=document.createElement("div");
    label.className="chartLabel";
    label.textContent="XAUUSD "+tf;
    wrap.appendChild(canvas);
    wrap.appendChild(label);
    root.appendChild(wrap);
    const chart={wrap,canvas,ctx:canvas.getContext("2d"),tf,w:1,h:1,plotW:1,axisW:48,min:0,max:1,start:0,end:0,barW:7,rightPad:5};
    charts.push(chart);
    bindChart(wrap,chart);
  });
  root.appendChild(replay);
  resizeCharts();
}

function resizeCharts(){
  charts.forEach(ch=>{
    const r=ch.wrap.getBoundingClientRect();
    const d=window.devicePixelRatio||1;
    ch.w=Math.max(1,r.width);
    ch.h=Math.max(1,r.height);
    ch.canvas.width=Math.floor(ch.w*d);
    ch.canvas.height=Math.floor(ch.h*d);
    ch.ctx.setTransform(d,0,0,d,0,0);
  });
  drawAll();
}

function drawAll(){
  applyTheme();
  updateControls();
  charts.forEach(drawChart);
  updateInfo();
  if($("statsScreen").style.display==="flex")drawVisibleStats();
}

function drawChart(ch){
  const ctx=ch.ctx,W=ch.w,H=ch.h;
  ch.axisW=48;
  ch.plotW=Math.max(10,W-ch.axisW);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=cssVar("--chart");
  ctx.fillRect(0,0,W,H);

  const v=visible(ch.tf);
  ch.start=v.start;ch.end=v.end;ch.rightPad=v.rightPad;
  const shown=v.bars.slice(v.start,v.end+1);
  const safeBars=shown.length?shown:[v.bars[0]];
  let min=Math.min(...safeBars.map(b=>b.l));
  let max=Math.max(...safeBars.map(b=>b.h));
  state.lines.forEach(l=>{if(Number.isFinite(l.price)){min=Math.min(min,l.price);max=Math.max(max,l.price)}});
  const p=state.position;
  ["entry","sl","tp"].forEach(k=>{if(Number.isFinite(p[k])){min=Math.min(min,p[k]);max=Math.max(max,p[k])}});
  if(state.settings.currentLine&&currentBar()){min=Math.min(min,currentBar().c);max=Math.max(max,currentBar().c)}
  const pad=(max-min)*.12||5;
  ch.min=min-pad;ch.max=max+pad;
  const slots=Math.max(20,shown.length+v.rightPad);
  ch.barW=ch.plotW/slots;

  drawGridAndAxes(ch);
  drawCandles(ch,shown);
  if(state.settings.currentLine&&currentBar())drawHLine(ch,currentBar().c,"#111",1.2,"",fmt(currentBar().c),true);
  state.lines.forEach(l=>drawHLine(ch,l.price,cssVar("--accent"),1.4,"",fmt(l.price),false,l.id));
  if(p.status==="pending"&&Number.isFinite(p.entry))drawHLine(ch,p.entry,p.side==="buy"?cssVar("--buy"):cssVar("--sell"),1.6,"注文",fmt(p.entry),false,"entry");
  if(p.status==="open"&&Number.isFinite(p.entry)){
    const col=state.mode==="practice"?"#fff":"#111";
    drawHLine(ch,p.entry,col,1.7,fmt(p.entry),fmtR(unrealizedR()),false,"entry");
  }
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(p.sl))drawHLine(ch,p.sl,cssVar("--sell"),1.4,"SL",fmt(p.sl),false,"sl");
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(p.tp))drawHLine(ch,p.tp,cssVar("--buy"),1.4,"TP",fmt(p.tp),false,"tp");
}

function drawGridAndAxes(ch){
  const ctx=ch.ctx,H=ch.h,W=ch.w,plotW=ch.plotW;
  ctx.strokeStyle=cssVar("--grid");
  ctx.lineWidth=1;
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="middle";
  ctx.textAlign="left";
  for(let i=0;i<=5;i++){
    const y=Math.round(8+(H-24)*i/5)+.5;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(plotW,y);ctx.stroke();
    const price=ch.max-(i/5)*(ch.max-ch.min);
    ctx.fillStyle=cssVar("--axis");
    ctx.fillText(fmt(price),plotW+4,clamp(y,10,H-12));
  }
  ctx.fillStyle=cssVar("--panel");
  ctx.fillRect(plotW,0,ch.axisW,H);
  ctx.strokeStyle=cssVar("--line");
  ctx.beginPath();ctx.moveTo(plotW+.5,0);ctx.lineTo(plotW+.5,H);ctx.stroke();

  const bars=data[ch.tf];
  const labelEvery=Math.max(5,Math.round((ch.end-ch.start+1)/4));
  ctx.textAlign="center";
  ctx.textBaseline="alphabetic";
  ctx.fillStyle=cssVar("--muted");
  for(let i=ch.start;i<=ch.end;i++){
    if((i-ch.start)%labelEvery!==0&&i!==ch.end)continue;
    const b=bars[i];
    if(!b)continue;
    const x=(i-ch.start)*ch.barW+ch.barW*.5;
    if(x<8||x>plotW-8)continue;
    ctx.fillText(timeLabel(b.t),x,H-4);
    ctx.strokeStyle=cssVar("--grid");
    ctx.beginPath();ctx.moveTo(Math.round(x)+.5,0);ctx.lineTo(Math.round(x)+.5,H-16);ctx.stroke();
  }
  ctx.textAlign="left";
}

function drawCandles(ch,bars){
  const ctx=ch.ctx;
  bars.forEach((b,i)=>{
    const x=i*ch.barW+ch.barW*.5;
    const yo=mapPrice(ch,b.o),yc=mapPrice(ch,b.c),yh=mapPrice(ch,b.h),yl=mapPrice(ch,b.l);
    const up=b.c>=b.o;
    ctx.strokeStyle=up?cssVar("--buy"):cssVar("--sell");
    ctx.fillStyle=ctx.strokeStyle;
    ctx.beginPath();ctx.moveTo(x,yh);ctx.lineTo(x,yl);ctx.stroke();
    const bodyY=Math.min(yo,yc),bodyH=Math.max(1,Math.abs(yc-yo));
    ctx.fillRect(x-ch.barW*.32,bodyY,ch.barW*.64,bodyH);
  });
}

function mapPrice(ch,price){return (ch.max-price)/(ch.max-ch.min)*ch.h}
function unmapPrice(ch,y){return ch.max-y/ch.h*(ch.max-ch.min)}

function drawHLine(ch,price,color,width,leftText,rightText,solid){
  if(!Number.isFinite(price))return;
  const ctx=ch.ctx,y=mapPrice(ch,price);
  if(y<-20||y>ch.h+20)return;
  ctx.save();
  ctx.strokeStyle=color;ctx.lineWidth=width;
  if(!solid)ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(0,Math.round(y)+.5);ctx.lineTo(ch.plotW,Math.round(y)+.5);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font="10px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif";
  ctx.textBaseline="middle";
  if(leftText){
    const w=Math.max(28,ctx.measureText(leftText).width+8);
    ctx.fillStyle=color;ctx.fillRect(2,clamp(y-10,1,ch.h-20),w,18);
    ctx.fillStyle=color==="#111"?"#fff":"#111";ctx.fillText(leftText,6,clamp(y,10,ch.h-10));
  }
  if(rightText){
    const w=Math.max(36,ctx.measureText(rightText).width+8);
    ctx.fillStyle=color;ctx.fillRect(ch.plotW-w-2,clamp(y-10,1,ch.h-20),w,18);
    ctx.fillStyle=color==="#111"?"#fff":"#111";ctx.fillText(rightText,ch.plotW-w+2,clamp(y,10,ch.h-10));
  }
  ctx.restore();
}

function timeLabel(t){
  const d=new Date(t+9*3600000);
  return String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0");
}

function jstFull(t){
  const d=new Date(t+9*3600000);
  return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0")+" "+String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0");
}

function bindChart(el,ch){
  let lastTapAt=0,lastTapId=null,suppressClick=false;
  el.addEventListener("pointerdown",e=>{
    hideLineMenu();
    el.setPointerCapture(e.pointerId);
    const pt=localPoint(ch,e);
    const hit=hitTest(ch,pt.x,pt.y);
    pointer={down:true,startX:e.clientX,startY:e.clientY,lastX:e.clientX,lastY:e.clientY,chart:ch,drag:null,moved:false,longAdded:false,axisStart:pt.x>ch.plotW};
    if(hit){
      pointer.drag={type:hit.type,id:hit.id||null};
      selectedLineId=hit.id||null;
    }else if(pointer.axisStart){
      holdTimer=setTimeout(()=>{
        const price=round(unmapPrice(ch,pt.y));
        const line={id:uid(),price};
        state.lines.push(line);
        selectedLineId=line.id;
        pointer.longAdded=true;
        suppressClick=true;
        saveFile();
        drawAll();
        showLineMenu(line.id,e.clientX-70,e.clientY-10);
      },620);
    }
  });
  el.addEventListener("pointermove",e=>{
    if(!pointer.down||pointer.chart!==ch)return;
    const totalX=e.clientX-pointer.startX,totalY=e.clientY-pointer.startY;
    if(Math.abs(totalX)>4||Math.abs(totalY)>4)pointer.moved=true;
    if(pointer.moved&&holdTimer){clearTimeout(holdTimer);holdTimer=null}
    const pt=localPoint(ch,e);
    if(pointer.drag){
      moveLineOrStop(pointer.drag,round(unmapPrice(ch,pt.y)));
      saveFile();
      drawAll();
    }else if(pointer.moved&&!pointer.axisStart){
      const dx=e.clientX-pointer.lastX;
      state.viewOffset=clamp(state.viewOffset-dx/(ch.barW||7)*tfFactor(ch.tf),0,Math.max(0,state.currentIndex-5));
      drawAll();
    }
    pointer.lastX=e.clientX;
    pointer.lastY=e.clientY;
  });
  el.addEventListener("pointerup",e=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    const wasMoved=pointer.moved;
    const wasLong=pointer.longAdded;
    if(!pointer.down)return;
    const pt=localPoint(ch,e);
    if(!wasMoved&&!wasLong){
      const hit=hitTest(ch,pt.x,pt.y);
      if(sltpMode){
        setStopFromTap(round(unmapPrice(ch,pt.y)));
        suppressClick=true;
      }else if(hit&&hit.type==="analysis"){
        showLineMenu(hit.id,e.clientX-70,e.clientY-8);
      }
    }
    pointer.down=false;
    pointer.drag=null;
    if(wasLong)suppressClick=true;
  });
  el.addEventListener("pointercancel",()=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    pointer.down=false;pointer.drag=null;
  });
  el.addEventListener("click",e=>{
    if(suppressClick){suppressClick=false;return}
    const pt=localPoint(ch,e);
    const hit=hitTest(ch,pt.x,pt.y);
    const now=Date.now();
    if(hit&&hit.type==="analysis"&&state.settings.doubleDelete&&lastTapId===hit.id&&now-lastTapAt<330){
      state.lines=state.lines.filter(l=>l.id!==hit.id);
      hideLineMenu();
      saveFile();
      drawAll();
    }
    lastTapAt=now;
    lastTapId=hit?hit.id:null;
  });
}

function localPoint(ch,e){
  const r=ch.wrap.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

function hitTest(ch,x,y){
  const p=state.position;
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(p.sl)&&Math.abs(mapPrice(ch,p.sl)-y)<11)return {type:"sl"};
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(p.tp)&&Math.abs(mapPrice(ch,p.tp)-y)<11)return {type:"tp"};
  if((p.status==="open"||p.status==="pending")&&Number.isFinite(p.entry)&&Math.abs(mapPrice(ch,p.entry)-y)<10)return {type:"entry"};
  for(let i=state.lines.length-1;i>=0;i--){
    const l=state.lines[i];
    if(Number.isFinite(l.price)&&Math.abs(mapPrice(ch,l.price)-y)<10)return {type:"analysis",id:l.id};
  }
  return null;
}

function moveLineOrStop(drag,price){
  const p=state.position;
  if(drag.type==="analysis"){
    const l=state.lines.find(x=>x.id===drag.id);
    if(l)l.price=price;
  }
  if(drag.type==="sl"&&(p.status==="open"||p.status==="pending"))p.sl=price;
  if(drag.type==="tp"&&(p.status==="open"||p.status==="pending"))p.tp=price;
  if(drag.type==="entry"&&p.status==="pending")p.entry=price;
  if(p.status==="open"&&Number.isFinite(p.entry)&&Number.isFinite(p.sl))p.risk=Math.abs(p.entry-p.sl)||p.risk||1;
}

function showLineMenu(id,x,y){
  selectedLineId=id;
  const m=$("lineMenu");
  m.style.display="block";
  m.style.left=clamp(x,6,window.innerWidth-136)+"px";
  m.style.top=clamp(y,48,window.innerHeight-190)+"px";
}
function hideLineMenu(){$("lineMenu").style.display="none"}

function market(side){
  const p=state.position;
  if(p.status==="open"||p.status==="pending"){
    if(!confirm("現在の注文/ポジションを置き換えますか？"))return;
  }
  const b=currentBar();
  state.position=Object.assign(flatPosition(),{status:"open",side,orderType:"market",entry:b.c,entryIndex:state.currentIndex,entryTime:b.t});
  saveFile();
  drawAll();
}

function pendingFromLine(kind){
  const line=state.lines.find(l=>l.id===selectedLineId);
  if(!line)return;
  const p=state.position;
  if(p.status==="open"||p.status==="pending"){
    if(!confirm("現在の注文/ポジションを置き換えますか？"))return;
  }
  state.position=Object.assign(flatPosition(),{status:"pending",side:kind.startsWith("buy")?"buy":"sell",orderType:kind,entry:line.price,lineId:line.id});
  hideLineMenu();
  saveFile();
  drawAll();
}

function closeTrade(){
  const p=state.position;
  if(p.status==="open"){
    const b=currentBar();
    closePosition(b.c,"closed_manual",state.currentIndex,b.t);
  }else if(p.status==="pending"){
    state.position=flatPosition();
  }
  saveFile();
  drawAll();
}

function closePosition(price,reason,idx,time){
  const p=state.position;
  if(p.status!=="open")return;
  const risk=p.risk||Math.abs((p.entry||price)-(Number.isFinite(p.sl)?p.sl:p.entry))||1;
  const resultR=p.side==="buy"?(price-p.entry)/risk:(p.entry-price)/risk;
  const trade={
    id:uid(),
    side:p.side,
    orderType:p.orderType,
    entryTime:p.entryTime,
    closeTime:time,
    entryIndex:p.entryIndex,
    exitIndex:idx,
    entry:round(p.entry),
    exit:round(price),
    sl:Number.isFinite(p.sl)?round(p.sl):null,
    tp:Number.isFinite(p.tp)?round(p.tp):null,
    closeReason:reason,
    resultR:Math.round(resultR*1000)/1000,
    barsHeld:Math.max(0,idx-(p.entryIndex||idx)),
    mfe:0,
    mae:0
  };
  enrichTrade(trade);
  state.trades.push(trade);
  state.position=flatPosition();
}

function enrichTrade(t){
  const s=clamp(t.entryIndex||0,0,data.M1.length-1),e=clamp(t.exitIndex||s,s,data.M1.length-1);
  const part=data.M1.slice(s,e+1);
  const risk=Math.abs(t.entry-(Number.isFinite(t.sl)?t.sl:t.entry))||1;
  if(!part.length)return;
  if(t.side==="buy"){
    t.mfe=Math.round(((Math.max(...part.map(b=>b.h))-t.entry)/risk)*1000)/1000;
    t.mae=Math.round(((Math.min(...part.map(b=>b.l))-t.entry)/risk)*1000)/1000;
  }else{
    t.mfe=Math.round(((t.entry-Math.min(...part.map(b=>b.l)))/risk)*1000)/1000;
    t.mae=Math.round(((t.entry-Math.max(...part.map(b=>b.h)))/risk)*1000)/1000;
  }
}

function unrealizedR(){
  const p=state.position,b=currentBar();
  if(p.status!=="open"||!Number.isFinite(p.entry)||!b)return NaN;
  const risk=p.risk||Math.abs(p.entry-(Number.isFinite(p.sl)?p.sl:p.entry))||1;
  return p.side==="buy"?(b.c-p.entry)/risk:(p.entry-b.c)/risk;
}

function evaluateBar(){
  const p=state.position,b=currentBar();
  if(!b)return;
  if(p.status==="pending"){
    let hit=false;
    if(p.orderType==="buy_limit"&&b.l<=p.entry)hit=true;
    if(p.orderType==="sell_limit"&&b.h>=p.entry)hit=true;
    if(p.orderType==="buy_stop"&&b.h>=p.entry)hit=true;
    if(p.orderType==="sell_stop"&&b.l<=p.entry)hit=true;
    if(hit){
      p.status="open";
      p.entryIndex=state.currentIndex;
      p.entryTime=b.t;
      p.risk=Number.isFinite(p.sl)?Math.abs(p.entry-p.sl)||1:null;
    }
  }
  if(p.status==="open"){
    if(Number.isFinite(p.sl)&&!p.risk)p.risk=Math.abs(p.entry-p.sl)||1;
    let reason=null,price=null;
    if(p.side==="buy"){
      if(Number.isFinite(p.sl)&&b.l<=p.sl){reason="closed_sl";price=p.sl}
      else if(Number.isFinite(p.tp)&&b.h>=p.tp){reason="closed_tp";price=p.tp}
    }else{
      if(Number.isFinite(p.sl)&&b.h>=p.sl){reason="closed_sl";price=p.sl}
      else if(Number.isFinite(p.tp)&&b.l<=p.tp){reason="closed_tp";price=p.tp}
    }
    if(reason)closePosition(price,reason,state.currentIndex,b.t);
  }
}

function step(dir,count=1){
  stopPlay(false);
  for(let i=0;i<count;i++){
    if(dir<0){
      if(state.mode!=="verify")break;
      state.currentIndex=clamp(state.currentIndex-1,10,data.M1.length-1);
      state.viewOffset=clamp(state.viewOffset,0,Math.max(0,state.currentIndex-5));
    }else{
      if(state.currentIndex>=data.M1.length-1)break;
      state.currentIndex++;
      state.viewOffset=0;
      evaluateBar();
    }
  }
  saveFile();
  drawAll();
}

function playToggle(){
  if(playTimer){stopPlay(true);return}
  $("playBtn").textContent="Ⅱ";
  const token=++playToken;
  const tick=()=>{
    if(token!==playToken)return;
    if(state.currentIndex>=data.M1.length-1){stopPlay(true);return}
    state.currentIndex++;
    state.viewOffset=0;
    evaluateBar();
    saveFile();
    drawAll();
    const ms=clamp(60000/(Number(state.speed)||20),45,1600);
    playTimer=setTimeout(tick,ms);
  };
  tick();
}

function stopPlay(redraw){
  playToken++;
  if(playTimer){clearTimeout(playTimer);playTimer=null}
  $("playBtn").textContent="▶";
  if(redraw)drawAll();
}

function startRepeat(dir){
  stopPlay(false);
  const run=()=>{
    if(dir<0&&state.mode!=="verify"){stopRepeat();return}
    const mult=clamp(Number(state.fastMult)||15,1,50);
    const per=Math.max(1,Math.round(mult/5));
    for(let i=0;i<per;i++){
      if(dir<0)state.currentIndex=clamp(state.currentIndex-1,10,data.M1.length-1);
      else{
        if(state.currentIndex>=data.M1.length-1)break;
        state.currentIndex++;
        evaluateBar();
      }
    }
    state.viewOffset=0;
    saveFile();
    drawAll();
    repeatTimer=setTimeout(run,70);
  };
  run();
}
function stopRepeat(){if(repeatTimer){clearTimeout(repeatTimer);repeatTimer=null}}

function setStopFromTap(price){
  const p=state.position;
  if(p.status!=="open"&&p.status!=="pending"){
    alert("先に注文またはポジションを作成してください");
    sltpMode=null;
    updateControls();
    return;
  }
  if(sltpMode==="sl")p.sl=price;
  if(sltpMode==="tp")p.tp=price;
  if(p.status==="open"&&Number.isFinite(p.entry)&&Number.isFinite(p.sl))p.risk=Math.abs(p.entry-p.sl)||p.risk||1;
  sltpMode=null;
  saveFile();
  drawAll();
}

function updateControls(){
  document.querySelectorAll("#modeSeg button").forEach(b=>b.classList.toggle("active",b.dataset.mode===state.mode));
  document.querySelectorAll("#tfBtns button").forEach(b=>b.classList.toggle("active",b.dataset.tf===state.timeframe));
  $("splitBtn").textContent=state.split?"2画":"1画";
  $("speedRange").value=state.speed;
  $("speedLabel").textContent=state.speed+"/m";
  $("fastMult").value=state.fastMult;
  $("slBtn").classList.toggle("hot",sltpMode==="sl");
  $("tpBtn").classList.toggle("hot",sltpMode==="tp");
}

function updateInfo(){
  const p=state.position;
  $("infoStatus").textContent=p.status||"flat";
  $("infoEntry").textContent=Number.isFinite(p.entry)?fmt(p.entry):"-";
  $("infoStops").textContent=(Number.isFinite(p.sl)?fmt(p.sl):"-")+" / "+(Number.isFinite(p.tp)?fmt(p.tp):"-");
  $("infoPnl").textContent=p.status==="open"?fmtR(unrealizedR()):"-";
}

function switchMode(mode){
  if(mode===state.mode)return;
  if(!confirm((mode==="practice"?"練習":"検証")+"モードへ切り替えますか？"))return;
  stopPlay(false);
  state.mode=mode;
  saveFile();
  drawAll();
}

function changeTimeframe(tf){
  if(!["M1","M15","H1"].includes(tf))return;
  state.timeframe=tf;
  state.viewOffset=clamp(state.viewOffset,0,Math.max(0,state.currentIndex-5));
  saveFile();
  setupCharts();
}

function toggleSplit(){
  state.split=!state.split;
  if(state.split&&state.timeframe==="H1")state.timeframe="M15";
  state.viewOffset=clamp(state.viewOffset,0,Math.max(0,state.currentIndex-5));
  saveFile();
  setupCharts();
}

function jumpSession(kind){
  const hours={asia:8,london:16,ny:22};
  const target=hours[kind];
  for(let i=state.currentIndex;i<data.M1.length;i++){
    const d=new Date(data.M1[i].t+9*3600000);
    if(d.getUTCHours()===target&&d.getUTCMinutes()===0){
      state.currentIndex=i;
      state.viewOffset=0;
      break;
    }
  }
  saveFile();
  drawAll();
}

function renderFileList(){
  const box=$("fileList");
  box.innerHTML=registry.files.map(f=>{
    const current=f.id===registry.currentId;
    return '<div class="fileRow"><div><b>'+esc(f.name)+(current?"（current）":"")+'</b><span>'+new Date(f.updatedAt).toLocaleString("ja-JP")+'</span></div><button data-file="'+esc(f.id)+'">'+(current?"選択中":"選択")+'</button></div>';
  }).join("");
}

function openStats(){
  statTab="graphs";
  $("statsScreen").style.display="flex";
  renderStats();
}

function tradeStats(trades){
  const n=trades.length;
  const wins=trades.filter(t=>t.resultR>0);
  const losses=trades.filter(t=>t.resultR<0);
  const sum=trades.reduce((a,t)=>a+(Number(t.resultR)||0),0);
  const gp=wins.reduce((a,t)=>a+t.resultR,0);
  const gl=Math.abs(losses.reduce((a,t)=>a+t.resultR,0));
  let maxW=0,maxL=0,cw=0,cl=0;
  trades.forEach(t=>{
    if(t.resultR>0){cw++;cl=0}else if(t.resultR<0){cl++;cw=0}else{cw=0;cl=0}
    maxW=Math.max(maxW,cw);maxL=Math.max(maxL,cl);
  });
  const avgWin=wins.length?gp/wins.length:0;
  const avgLoss=losses.length?gl/losses.length:0;
  return {n,winRate:n?wins.length/n*100:0,avgR:n?sum/n:0,pf:gl?gp/gl:(gp?Infinity:0),expectancy:n?sum/n:0,maxW,maxL,rr:avgLoss?avgWin/avgLoss:0,sum};
}

function hourlyStats(stepMin){
  const map={};
  state.trades.forEach(t=>{
    if(!Number.isFinite(t.entryTime))return;
    const d=new Date(t.entryTime+9*3600000);
    const h=d.getUTCHours(),m=d.getUTCMinutes();
    const key=stepMin===60?String(h).padStart(2,"0")+":00":String(h).padStart(2,"0")+":"+String(Math.floor(m/10)*10).padStart(2,"0");
    (map[key]||(map[key]=[])).push(t);
  });
  return Object.keys(map).sort().map(k=>Object.assign({key:k},tradeStats(map[k])));
}

function renderSummaryTab(){

function renderExitTab(){
  const nRows=[],rrRows=[];
  for(let n=1;n<=20;n++){
    const rs=state.trades.map(t=>simulateNExit(t,n)).filter(Number.isFinite).map(r=>({resultR:r}));
    nRows.push(Object.assign({rule:n},tradeStats(rs)));
  }
  for(let rr=1;rr<=5.001;rr+=.5){
    const rs=state.trades.map(t=>simulateRR(t,rr)).filter(Number.isFinite).map(r=>({resultR:r}));
    rrRows.push(Object.assign({rule:rr.toFixed(1)},tradeStats(rs)));
  }
  const bestN=nRows.reduce((a,b)=>b.expectancy>a.expectancy?b:a,{expectancy:-Infinity,rule:"-"});
  const bestRR=rrRows.reduce((a,b)=>b.expectancy>a.expectancy?b:a,{expectancy:-Infinity,rule:"-"});
  $("statsBody").innerHTML='<div class="card"><h3>簡易グラフ</h3><canvas class="graphCanvas" id="exitGraph"></canvas><span class="badge">最適N '+esc(bestN.rule)+'</span> <span class="badge">最適RR '+esc(bestRR.rule)+'</span></div><div class="card"><h3>N本後決済ルール</h3>'+simpleTable(["N","勝率","PF","Expectancy"],nRows.map(x=>[x.rule,x.winRate.toFixed(1)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2),x.expectancy.toFixed(2)]))+'</div><div class="card"><h3>RR固定TPルール</h3>'+simpleTable(["RR","勝率","PF","Expectancy"],rrRows.map(x=>[x.rule,x.winRate.toFixed(1)+"%",x.pf===Infinity?"∞":x.pf.toFixed(2),x.expectancy.toFixed(2)]))+'</div>';
  setTimeout(()=>drawExitGraph(nRows),0);
}

function simulateNExit(t,n){
  if(!Number.isFinite(t.entryIndex))return NaN;
  const idx=clamp(t.entryIndex+n,0,data.M1.length-1);
  const exit=data.M1[idx].c;
  const risk=Math.abs(t.entry-(Number.isFinite(t.sl)?t.sl:t.entry))||1;
  return t.side==="buy"?(exit-t.entry)/risk:(t.entry-exit)/risk;
}

function simulateRR(t,rr){
  if(!Number.isFinite(t.entryIndex))return NaN;
  const risk=Math.abs(t.entry-(Number.isFinite(t.sl)?t.sl:t.entry))||1;
  const target=t.side==="buy"?t.entry+risk*rr:t.entry-risk*rr;
  const stop=t.sl;
  const end=clamp(t.entryIndex+60,0,data.M1.length-1);
  for(let i=t.entryIndex;i<=end;i++){
    const b=data.M1[i];
    if(t.side==="buy"){
      if(Number.isFinite(stop)&&b.l<=stop)return -1;
      if(b.h>=target)return rr;
    }else{
      if(Number.isFinite(stop)&&b.h>=stop)return -1;
      if(b.l<=target)return rr;
    }
  }
  const exit=data.M1[end].c;
  return t.side==="buy"?(exit-t.entry)/risk:(t.entry-exit)/risk;
}

function metric(k,v){return '<div class="metric"><span>'+esc(k)+'</span><b>'+esc(v)+'</b></div>'}
function simpleTable(head,rows){
  return '<div class="tableWrap"><table><thead><tr>'+head.map(h=>'<th>'+esc(h)+'</th>').join("")+'</tr></thead><tbody>'+(rows.length?rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join("")+'</tr>').join(""):'<tr><td colspan="'+head.length+'">データなし</td></tr>')+'</tbody></table></div>';
}
function tradeTable(trades){
  return simpleTable(["エントリー日時","Entry","Exit","SL","TP","closeReason","resultR"],trades.slice().reverse().map(t=>[jstFull(t.entryTime),fmt(t.entry),fmt(t.exit),Number.isFinite(t.sl)?fmt(t.sl):"-",Number.isFinite(t.tp)?fmt(t.tp):"-",t.closeReason,fmtR(t.resultR)]));
}

function prepCanvas(c){
  if(!c)return null;
  const r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;
  c.width=Math.max(1,Math.floor(r.width*d));
  c.height=Math.max(1,Math.floor(r.height*d));
  const ctx=c.getContext("2d");
  ctx.setTransform(d,0,0,d,0,0);
  ctx.fillStyle=cssVar("--chart");
  ctx.fillRect(0,0,r.width,r.height);
  ctx.strokeStyle=cssVar("--grid");
  for(let i=0;i<=4;i++){
    const y=18+(r.height-34)*i/4;
    ctx.beginPath();ctx.moveTo(28,y);ctx.lineTo(r.width-10,y);ctx.stroke();
  }
  ctx.font="10px sans-serif";
  ctx.fillStyle=cssVar("--muted");
  return {ctx,w:r.width,h:r.height};
}
function drawVisibleStats(){
  if(statTab!=="graphs")return;
  drawEquity($("eqGraph"));
  drawHour($("hourGraph"));
  drawHist($("histGraph"));
}
function drawEquity(c){
  const p=prepCanvas(c);if(!p)return;
  const vals=[0];state.trades.forEach(t=>vals.push(vals[vals.length-1]+(Number(t.resultR)||0)));
  const min=Math.min(...vals,0),max=Math.max(...vals,1),range=max-min||1;
  p.ctx.strokeStyle=cssVar("--accent");p.ctx.lineWidth=2;p.ctx.beginPath();
  vals.forEach((v,i)=>{const x=28+(p.w-40)*(i/Math.max(1,vals.length-1));const y=14+(p.h-32)*(1-(v-min)/range);i?p.ctx.lineTo(x,y):p.ctx.moveTo(x,y)});
  p.ctx.stroke();
  p.ctx.fillText("累積 "+fmtR(vals[vals.length-1]),32,16);
}
function drawHour(c){
  const p=prepCanvas(c);if(!p)return;
  const hs=hourlyStats(60);
  const vals=Array.from({length:24},(_,i)=>{const x=hs.find(a=>parseInt(a.key,10)===i);return x?x.avgR:0});
  const max=Math.max(1,...vals.map(Math.abs));
  const zero=18+(p.h-34)/2,bw=(p.w-42)/24;
  vals.forEach((v,i)=>{const bh=(p.h-38)/2*Math.abs(v)/max;p.ctx.fillStyle=v>=0?cssVar("--buy"):cssVar("--sell");p.ctx.fillRect(30+i*bw,v>=0?zero-bh:zero,Math.max(2,bw-2),bh)});
  p.ctx.strokeStyle=cssVar("--axis");p.ctx.beginPath();p.ctx.moveTo(28,zero);p.ctx.lineTo(p.w-10,zero);p.ctx.stroke();
}
function drawHist(c){
  const p=prepCanvas(c);if(!p)return;
  const bins=[-3,-2,-1,0,1,2,3,4,5],cnt=Array(bins.length-1).fill(0);
  state.trades.forEach(t=>{const r=Number(t.resultR)||0;for(let i=0;i<bins.length-1;i++){if(r>=bins[i]&&r<bins[i+1]){cnt[i]++;break}}});
  const max=Math.max(1,...cnt),bw=(p.w-42)/cnt.length;
  cnt.forEach((v,i)=>{const bh=(p.h-38)*v/max;p.ctx.fillStyle=i<3?cssVar("--sell"):cssVar("--buy");p.ctx.fillRect(30+i*bw,p.h-18-bh,Math.max(3,bw-3),bh)});
}
function drawExitGraph(rows){
  const p=prepCanvas($("exitGraph"));if(!p)return;
  const vals=rows.map(x=>x.expectancy);
  const min=Math.min(-1,...vals),max=Math.max(1,...vals),range=max-min||1;
  p.ctx.strokeStyle=cssVar("--accent");p.ctx.lineWidth=2;p.ctx.beginPath();
  vals.forEach((v,i)=>{const x=30+(p.w-42)*(i/Math.max(1,vals.length-1));const y=14+(p.h-32)*(1-(v-min)/range);i?p.ctx.lineTo(x,y):p.ctx.moveTo(x,y)});
  p.ctx.stroke();
  p.ctx.fillText("N本後 Expectancy",32,16);
}

function downloadStats(){
  const payload={fileId:registry.currentId,fileName:state.name,exportedAt:new Date().toISOString(),stats:tradeStats(state.trades),hourly:hourlyStats(60),trades:state.trades};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="xauusd_stats_"+(state.name||"file")+"_"+Date.now()+".json";
  document.body.appendChild(a);
  a.click();
  const href=a.href;
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(href),1000);
}

function bindHold(btn,dir){
  let held=false;
  btn.addEventListener("pointerdown",e=>{
    btn.setPointerCapture(e.pointerId);
    held=false;
    holdTimer=setTimeout(()=>{held=true;startRepeat(dir)},360);
  });
  btn.addEventListener("pointerup",()=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    stopRepeat();
    if(!held)step(dir,1);
  });
  btn.addEventListener("pointercancel",()=>{if(holdTimer){clearTimeout(holdTimer);holdTimer=null}stopRepeat()});
}
